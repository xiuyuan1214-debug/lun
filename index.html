<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>跑者服務中心</title>
    <style>
        /* 1. 全域背景：米黃色 */
        body {
            margin: 0; padding: 20px 0;
            background-color: #f7f1d5 !important;
            font-family: -apple-system, sans-serif;
            display: flex; justify-content: center;
        }

        /* 2. 白色圓角卡片 (最關鍵的結構) */
        .card {
            width: 92%; max-width: 480px;
            background: white !important;
            border-radius: 30px !important;
            box-shadow: 0 8px 30px rgba(0,0,0,0.05);
            overflow: hidden;
        }

        /* 3. 內文與表單區 */
        .content { padding: 35px 25px; }

        .title { color: #614e1a; font-size: 24px; font-weight: bold; margin: 0; }
        .subtitle { color: #b5a48d; font-size: 11px; margin: 5px 0 25px 0; }
        .slogan { color: #614e1a; font-size: 15px; font-weight: bold; margin-bottom: 12px; }
        .text { color: #8c7e6a; font-size: 14px; line-height: 1.8; margin-bottom: 15px; }

        /* 4. 表單欄位：米白色背景 + 圓角 */
        label { display: block; color: #614e1a; font-weight: bold; margin-top: 25px; }
        input, select, textarea {
            width: 100%; padding: 12px; margin-top: 8px;
            background: #fffef9 !important; border: 1px solid #f0eada !important;
            border-radius: 12px !important; box-sizing: border-box; outline: none;
        }
        
        .service-hours {
            font-size: 10px; color: #b5a48d;
            border-top: 1px solid #eee; padding-top: 15px; margin-top: 20px;
        }
    </style>
</head>
<body>

    <!-- 必須要有這個 class="card"，上面的圓角樣式才會生效 -->
    <div class="card">
        <div class="content">
            <h1 class="title">跑者服務中心</h1>
            <div class="subtitle">RUNNER SERVICE CENTER</div>
            
            <p class="slogan">讓我們聽見您的腳步聲</p>
            <p class="text">無論您是因為突破個人最佳成績而興奮，亦或是正處於低潮，歡迎聯繫我們。希望這裡不只是網站，更是跑者們的補給站。</p>

            <form>
                <label>姓名 / Name</label>
                <input type="text" placeholder="請輸入姓名">

                <label>跑者屬性</label>
                <select><option>新手跑者</option><option>馬拉松選手</option></select>

                <label>您的問題</label>
                <textarea style="height: 100px;" placeholder="每一滴汗水，都值得被聽見..."></textarea>
                
                <div class="service-hours">
                    ☀ 服務時間：週一至週五 09:00 - 18:00 (小編也需要運動)
                </div>
            </form>
        </div>
    </div>

</body>
</html>
