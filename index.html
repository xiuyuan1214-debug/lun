<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>跑者服務中心 Runner Service Center</title>
    <style>
        body { margin: 0; padding: 0; font-family: -apple-system, "Noto Sans TC", sans-serif; background-color: #ffffff; color: #4a3c31; }
        
        /* 標題區域：背景與文字對齊圖片 */
        .header-section { background-color: #fff9e6; padding: 25px 20px 15px 20px; text-align: left; box-sizing: border-box; }
        .content-limit { max-width: 480px; margin: 0 auto; }
        
        .title-main { font-size: 20px; font-weight: bold; margin-bottom: 2px; color: #2d241d; }
        .title-sub { font-size: 11px; color: #b5a48d; margin-bottom: 15px; font-weight: normal; letter-spacing: 1px; }
        
        .slogan { font-size: 14px; font-weight: bold; margin-bottom: 12px; color: #4a3c31; }
        .intro-p { font-size: 13px; line-height: 1.6; margin-bottom: 12px; color: #4a3c31; }
        
        /* 服務時間：極小化處理 */
        .service-hours { 
            font-size: 10px; 
            color: #b5a48d; 
            margin-top: 15px; 
            display: inline-block;
            transform: scale(0.6); 
            transform-origin: left top;
            opacity: 0.7;
        }

        /* 框框樣式：圓角與背景色 */
        .form-section { padding: 20px; }
        .field-label { font-size: 13px; font-weight: bold; display: block; margin-bottom: 6px; color: #4a3c31; }
        
        .input-box { 
            width: 100%; 
            box-sizing: border-box; 
            border: 1px solid #e0e0e0; 
            border-radius: 8px; /* 圓角 */
            padding: 10px 12px; 
            font-size: 14px;   
            margin-bottom: 15px; 
            outline: none; 
            background: #fafafa; /* 淺灰背景 */
            color: #4a3c31;
        }
        
        /* 雙欄位排列 */
        .row { display: flex; gap: 10px; }
        .col { flex: 1; }

        .submit-btn { 
            width: 100%; 
            background-color: #4a3c31; 
            color: white; 
            border: none; 
            padding: 12px; 
            font-size: 15px; 
            font-weight: bold; 
            border-radius: 6px; 
            cursor: pointer; 
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <div class="header-section">
        <div class="content-limit">
            <div class="title-main">跑者服務中心</div>
            <div class="title-sub">RUNNER SERVICE CENTER</div>
            
            <div class="slogan">讓我們聽見您的腳步聲</div>
            
            <p class="intro-p">無論您是因為突破個人最佳成績而興奮，亦或是正處於受傷低潮，有任何想回饋的想法，歡迎隨時聯繫我們唷 ◡̈</p>
            <p class="intro-p">您的回饋是我們進化的動力，您的提問是我們探索的方向，若您在訓練的路上遇到瓶頸，或者發現我們能做得更好的地方，請告訴我們。</p>
            <p class="intro-p">讓我們一起朝更好的方向邁進，讓這份對跑步的熱愛，連結起每一個熱血的靈魂。希望這裡不只是網站，更是跑者們的補給站。</p>
            
            <div class="service-hours">☀️ 服務時間：週一至週五 09:00 - 18:00 (跑者不休息，但小編需要一些運動時間)</div>
        </div>
    </div>

    <div class="form-section">
        <div class="content-limit">
            <label class="field-label">姓名 / Name</label>
            <input type="text" class="input-box" placeholder="請輸入您的姓名">
            
            <label class="field-label">電子信箱 / E-mail</label>
            <input type="email" class="input-box" placeholder="runner@example.com">

            <label class="field-label">跑者屬性</label>
            <select class="input-box">
                <option>新手跑者</option>
                <option>馬拉松選手</option>
            </select>

            <div class="row">
                <div class="col">
                    <label class="field-label">跑步最佳成績 (PB)</label>
                    <input type="text" class="input-box" placeholder="例如：全馬3:30:00">
                </div>
                <div class="col">
                    <label class="field-label">目標成績</label>
                    <input type="text" class="input-box" placeholder="例如：全馬2:59:59">
                </div>
            </div>

            <label class="field-label">慣用穿戴配備</label>
            <input type="text" class="input-box" placeholder="例如：Garmin, Apple Watch, Coros">

            <label class="field-label">您的問題</label>
            <textarea class="input-box" style="height: 100px;" placeholder="每一滴汗水，都值得被聽見..."></textarea>
            
            <button type="submit" class="submit-btn">送出表單</button>
        </div>
    </div>

</body>
</html>
