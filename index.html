<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>跑者服務中心 | 聯絡我們</title>
    <style>
        body { margin: 0; padding: 0; font-family: -apple-system, "Noto Sans TC", sans-serif; background-color: #ffffff; color: #4a3c31; }
        
        /* 導覽列 */
        .nav-bar { background-color: #333333; padding: 12px 20px; display: flex; justify-content: center; gap: 20px; }
        .nav-item { color: #ffffff !important; text-decoration: none !important; font-size: 14px; cursor: pointer; }
        .nav-item:visited { color: #ffffff !important; }

        /* 標題區域 */
        .header-section { background-color: #fff9e6; padding: 20px 20px 15px 20px; text-align: center; width: 100%; box-sizing: border-box; }
        .content-limit { max-width: 500px; margin: 0 auto; text-align: left; }
        .title-main { font-size: 19px; font-weight: bold; margin-bottom: 12px; text-align: center; color: #2d241d; }
        .intro-p { font-size: 14px; line-height: 1.6; margin-bottom: 8px; color: #4a3c31; }
        
        /* --- 終極縮小方案 --- */
        .service-hours { 
            font-size: 10px !important; 
            color: #b5a48d; 
            margin-top: 10px; 
            text-align: left; 
            /* 使用縮放功能強制突破瀏覽器最小字體限制 */
            display: inline-block;
            transform: scale(0.8); 
            transform-origin: left top;
            white-space: nowrap;
            opacity: 0.7;
        }

        /* 表單樣式 */
        .form-section { padding: 15px 20px; }
        .field-label { font-size: 11px; font-weight: bold; display: block; margin-bottom: 4px; color: #4a3c31; }
        .input-box { width: 100%; box-sizing: border-box; border: 1px solid #eeeeee; border-radius: 4px; padding: 8px 12px; font-size: 14px; margin-bottom: 12px; outline: none; background: #fff; }
        .submit-btn { width: 100%; background-color: #4a3c31; color: white; border: none; padding: 12px; font-size: 15px; font-weight: bold; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="navBar"></div>

    <div class="header-section">
        <div class="content-limit">
            <div class="title-main">跑者服務中心</div>
            <p class="intro-p">無論您是因突破個人最佳成績而興奮，亦或是正處於受傷低潮，歡迎聯繫我們唷。</p>
            <p class="intro-p">希望這裡不只是網站，更是跑者們的補給站 ◡̈</p>
            
            <!-- 這一行現在會縮到極小 -->
            <div class="service-hours">☀️服務時間：週一至週五 09:00 - 18:00 (跑者不休息，但小編需要一些運動時間)</div>
        </div>
    </div>

    <div class="form-section">
        <div class="content-limit">
            <label class="field-label">姓名 / Name</label>
            <input type="text" class="input-box">
            
            <label class="field-label">您的問題 / Your Inquiry</label>
            <textarea class="input-box" rows="4"></textarea>

            <button type="submit" class="submit-btn">送出表單 / Submit</button>
        </div>
    </div>

    <script src="nav_bar.js"></script>
</body>
</html>
