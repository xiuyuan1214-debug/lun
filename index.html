<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>跑者服務中心</title>
    <style>
        /* 1. 底層背景 */
        body {
            margin: 0; padding: 20px 0;
            background-color: #f7f1d5 !important;
            font-family: sans-serif;
            display: flex; justify-content: center;
        }

        /* 2. 中間白色卡片：這是您最想要的樣式 */
        .card {
            width: 90%; max-width: 450px;
            background: white !important;
            border-radius: 30px !important;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        /* 3. 文字內容區 */
        .content { padding: 30px 20px; }

        .title { color: #614e1a; font-size: 24px; font-weight: bold; margin: 0; }
        .subtitle { color: #b5a48d; font-size: 11px; margin-bottom: 20px; }
        .text { color: #8c7e6a; font-size: 14px; line-height: 1.6; }

        /* 4. 表單欄位 */
        label { display: block; color: #614e1a; font-weight: bold; margin-top: 20px; }
        input, select, textarea {
            width: 100%; padding: 12px; margin-top: 5px;
            background: #fffef9; border: 1px solid #f0eada;
            border-radius: 12px; box-sizing: border-box;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="content">
            <h1 class="title">跑者服務中心</h1>
            <div class="subtitle">RUNNER SERVICE CENTER</div>
            
            <p style="color: #614e1a; font-weight: bold;">讓我們聽見您的腳步聲</p>
            <p class="text">無論您是因為突破個人最佳成績而興奮，亦或是正處於受傷低潮，歡迎聯繫我們。</p>

            <form>
                <label>姓名 / Name</label>
                <input type="text" placeholder="請輸入姓名">

                <label>跑者屬性</label>
                <select><option>新手跑者</option><option>馬拉松選手</option></select>

                <label>您的問題</label>
                <textarea placeholder="每一滴汗水，都值得被聽見..."></textarea>
                
                <div style="font-size: 10px; color: #b5a48d; margin-top: 20px; border-top: 1px solid #eee; padding-top: 10px;">
                    ☀ 服務時間：週一至週五 09:00 - 18:00
                </div>
            </form>
        </div>
    </div>

</body>
</html>
