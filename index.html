  <script>
    function fnHello() {
      alert("hello javaScript");
    }
    function showHideDiv() {
      var showHideDiv = document.getElementById("myDiv");
      var showBtn = document.getElementById("showBtn");

      if (showHideDiv.style.display == "none") {
        showHideDiv.style.display = "block";
        showBtn.style.display = "none";
      }
      else {
        showHideDiv.style.display = "none";
        showBtn.style.display = "block";
      }
    }

  </script>





  <style>
    .Endorsement {
      position: absolute;
      /* border: 3px solid red; */
      z-index: 600;

    }

    .Endorsement img {
      width: 100%;
      transform: translate(-50px, 0px);
    }

    #before {
      width: 300px;
      margin-top: 163px;
      transform-origin: top;
      animation-name: logo_animation;
      animation-duration: 2s;
      animation-iteration-count: infinite;
    }

    #after {
      width: 300px;
      height: 300px;
      animation-name: logo_animation;
      animation-duration: 2s;
      animation-iteration-count: infinite;
    }

    #stick {
      width: 20px;
      /* transition: 1.5s; */
      transform: translate(140px, 60px) rotate(-6deg);
    }

    #stick:active {
      /* transform: translate(140px, 30px) rotate(6deg); */
      animation-name: subAni;
      animation-duration: 5s;
      animation-iteration-count: 1;
      
    }
    
    @keyframes subAni {
      0% {
        transform: translate(140px,60px);
      }
      25% {
        transform: translate(140px,-100px);
      }
      50%{/*50%-100%效果一樣，花一半時間停止  */
        transform: translate(500px,300px) scale(3) ;
      }
      100%{
        transform: translate(500px,300px) scale(3) ;
      }
    }

    @keyframes logo_animation {
      0% {
        transform: rotate(0deg);
      }

      25% {
        transform: rotate(15deg);
      }

      50% {
        transform: rotate(-15deg);
      }

      75% {
        transform: rotate(15deg);
      }

      100% {
        transform: rotate(0deg);
      }
    }
  </style>

  <div id="after" class="Endorsement"><img src="Endorsement/Endorsement_after.png"></div>
  <div id="stick" class="Endorsement"><img src="Endorsement/stick.png"></div>
  <div id="before" class="Endorsement"><img src="Endorsement/Endorsement_before.png"></div>
