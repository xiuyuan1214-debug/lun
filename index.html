<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>跑者服務中心</title>
    <style>
        /* 基礎設定 */
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #ffffff;
            line-height: 1.6;
        }

        /* 上半部：米黃色背景區 */
        .header-section {
            background-color: #fcf6d6; /* 準確提取截圖中的米黃色 */
            padding: 45px 30px 30px 30px;
            color: #614e1a; /* 深咖啡色文字 */
        }

        .title-main {
            font-size: 24px;
            font-weight: bold;
            margin: 0;
        }

        .title-sub {
            font-size: 11px;
            color: #b5a48d;
            margin: 8px 0 35px 0;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .slogan {
            font-size: 15px;
            font-weight: bold;
            margin-bottom: 12px;
        }

        .description {
            font-size: 14.5px;
            color: #7a6a53;
            margin-bottom: 20px;
        }

        .service-footer {
            font-size: 10px;
            color: #b5a48d;
            border-top: 1px solid #efe8c5;
            padding-top: 15px;
            margin-top: 30px;
        }

        /* 下半部：白色表單區 */
        .form-section {
            background-color: #ffffff;
            padding: 40px 30px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            color: #614e1a;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 12px;
        }

        /* 輸入框樣式：米色背景 + 細圓角邊框 */
        input, select, textarea {
            width: 100%;
            padding: 14px 16px;
            background-color: #fffef9; /* 極淡米色 */
            border: 1px solid #f0eada;
            border-radius: 12px;
            font-size: 14px;
            color: #614e1a;
            box-sizing: border-box;
            outline: none;
        }

        /* 橫向並排欄位 (PB 與 目標成績) */
        .form-row {
            display: flex;
            gap: 15px;
        }
        .form-row .col {
            flex: 1;
        }

        /* 針對不同裝置優化 */
        @media (max-width: 480px) {
            .form-row { flex-direction: column; gap: 0; }
        }

        textarea {
            height: 120px;
            resize: none;
        }

        ::placeholder {
            color: #d3d3d3;
        }
    </style>
</head>
<body>

    <!-- 上半部：文字介紹區塊 -->
    <div class="header-section">
        <h1 class="title-main">跑者服務中心</h1>
        <div class="title-sub">RUNNER SERVICE CENTER</div>
        
        <p class="slogan">讓我們聽見您的腳步聲</p>
        
        <div class="description">
            無論您是因為突破個人最佳成績而興奮，亦或是正處於受傷低潮，有任何想回饋的想法，歡迎隨時聯繫我們唷 ☺
        </div>
        
        <div class="description">
            您的回饋是我們進化的動力，您的提問是我們探索的方向，若您在訓練的路上遇到瓶頸，或者發現我們能做得更好的地方，請告訴我們。
        </div>

        <div class="description">
            讓我們一起朝更好的自己邁進，讓這份對跑步的熱愛，連結起每一個熱血的靈魂。希望這裡不只是網站，更是跑者們的補給站。
        </div>

        <div class="service-footer">
            ☀ 服務時間：週一至週五 09:00 - 18:00 (跑者不休息，但小編需要一些運動時間)
        </div>
    </div>

    <!-- 下半部：填寫表單區塊 -->
    <div class="form-section">
        <form>
            <div class="form-group">
                <label>姓名 / Name</label>
                <input type="text" placeholder="請輸入您的姓名">
            </div>

            <div class="form-group">
                <label>電子信箱 / E-mail</label>
                <input type="email" placeholder="runner@example.com">
            </div>

            <div class="form-group">
                <label>跑者屬性</label>
                <select>
                    <option value="" disabled selected>新手跑者</option>
                    <option>馬拉松選手</option>
                    <option>越野跑者</option>
                </select>
            </div>

            <div class="form-row">
                <div class="col form-group">
                    <label>跑步最佳成績 (PB)</label>
                    <input type="text" placeholder="例如：全馬3:30:00">
                </div>
                <div class="col form-group">
                    <label>目標成績</label>
                    <input type="text" placeholder="例如：全馬2:59:59">
                </div>
            </div>

            <div class="form-group">
                <label>慣用穿戴配備</label>
                <input type="text" placeholder="例如：Garmin, Apple Watch, Coros">
            </div>

            <div class="form-group">
                <label>您的問題</label>
                <textarea placeholder="每一滴汗水，都值得被聽見..."></textarea>
            </div>
        </form>
    </div>

</body>
</html>
