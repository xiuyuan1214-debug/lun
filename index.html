<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>跑者服務中心 Runner Service Center</title>
    <style>
        body { margin: 0; padding: 0; font-family: -apple-system, "Noto Sans TC", sans-serif; background-color: #ffffff; color: #4a3c31; }
        
        /* 標題區域：維持您的原狀文案 */
        .header-section { background-color: #fff9e6; padding: 20px 15px 10px 15px; text-align: left; }
        .content-limit { max-width: 480px; margin: 0 auto; }
        
        .title-main { font-size: 19px; font-weight: bold; color: #2d241d; margin-bottom: 2px; }
        .title-sub { font-size: 11px; color: #b5a48d; letter-spacing: 1px; margin-bottom: 12px; }
        .slogan { font-size: 14px; font-weight: bold; margin-bottom: 8px; }
        .intro-p { font-size: 13px; line-height: 1.5; margin-bottom: 8px; }

        /* --- 服務時間：極限縮小 (第三次縮小嘗試) --- */
        .service-hours { 
            font-size: 10px !important; 
            color: #b5a48d; 
            display: inline-block;
            transform: scale(0.35); /* 強制降至 0.35 倍 */
            transform-origin: left center;
            opacity: 0.5;
            white-space: nowrap;
            margin-top: 5px;
        }

        /* --- 框框極致縮窄方案 --- */
        .form-section { padding: 15px; }
        .field-label { font-size: 13px; font-weight: bold; display: block; margin-bottom: 5px; }
        
        .input-box { 
            width: 70%;        /* 強制將寬度降至 70% (原本是 100%) */
            max-width: 240px;  /* 絕對限制最大寬度 */
            box-sizing: border-box; 
            border: 1px solid #e0e0e0; 
            border-radius: 8px; 
            padding: 8px 10px; 
            font-size: 14px;   
            margin-bottom: 15px; 
            background: #fafafa;
            height: 34px;      /* 稍微壓低高度讓比例協調 */
        }
        
        textarea.input-box { height: 80px; width: 85%; max-width: 300px; } /* 問題框稍微寬一點點但仍比原本窄 */

        .submit-btn { 
            width: 70%; 
            max-width: 240px;
            background-color: #4a3c31; 
            color: white; 
            border: none; 
            padding: 10px; 
            font-size: 14px; 
            font-weight: bold; 
            border-radius: 6px; 
            cursor: pointer; 
        }
    </style>
</head>
<body>

    <div class="header-section">
        <div class="content-limit">
            <div class="title-main">跑者服務中心</div>
            <div class="title-sub">RUNNER SERVICE CENTER</div>
            <div class="slogan">讓我們聽見您的腳步聲</div>
            <p class="intro-p">無論您是因為突破個人最佳成績而興奮，亦或是正處於受傷低潮，有任何想回饋的想法，歡迎隨時聯繫我們唷 ◡̈</p>
            <p class="intro-p">您的回饋是我們進化的動力，您的提問是我們探索的方向...</p>
            <p class="intro-p">希望這裡不只是網站，更是跑者們的補給站。</p>
            
            <div class="service-hours">☀️ 服務時間：週一至週五 09:00 - 18:00 (跑者不休息，但小編需要一些運動時間)</div>
        </div>
    </div>

    <div class="form-section">
        <div class="content-limit">
            <label class="field-label">姓名 / Name</label>
            <input type="text" class="input-box" placeholder="請輸入您的姓名">
            
            <label class="field-label">電子信箱 / E-mail</label>
            <input type="email" class="input-box" placeholder="runner@example.com">

            <label class="field-label">跑者屬性</label>
            <select class="input-box">
                <option>初階跑者</option>
                <option>馬拉松選手</option>
            </select>

            <label class="field-label">慣用穿戴配備</label>
            <input type="text" class="input-box" placeholder="例如：Garmin, Apple Watch">

            <label class="field-label">您的問題</label>
            <textarea class="input-box" placeholder="每一滴汗水，都值得被聽見..."></textarea>
            
            <button type="submit" class="submit-btn">送出表單</button>
        </div>
    </div>

</body>
</html>
