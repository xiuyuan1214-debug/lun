<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>跑者服務中心 Runner Service Center</title>
    <style>
        body { margin: 0; padding: 0; font-family: -apple-system, "Noto Sans TC", sans-serif; background-color: #ffffff; color: #4a3c31; }
        
        /* 1. 標題區塊：對齊 IMG_5426.jpg */
        .header-v3 { background-color: #fff9e6; padding: 30px 20px 20px 25px; text-align: left; }
        .limit-v3 { max-width: 500px; margin: 0 auto; }
        
        .title-main { font-size: 22px; font-weight: bold; margin-bottom: 5px; color: #4a3c31; }
        .title-sub { font-size: 10px; color: #b5a48d; margin-bottom: 25px; font-weight: normal; letter-spacing: 1px; }
        
        .slogan-v3 { font-size: 14px; font-weight: bold; margin-bottom: 15px; color: #4a3c31; }
        .p-v3 { font-size: 13.5px; line-height: 1.8; margin-bottom: 18px; color: #4a3c31; }
        
        /* 2. 服務時間：極微型化 (強制縮小至 0.3) */
        .hours-v3 { 
            font-size: 10px !important; 
            color: #b5a48d; 
            margin-top: 20px; 
            display: inline-block;
            transform: scale(0.3) !important; 
            transform-origin: left top;
            opacity: 0.6;
            white-space: nowrap;
            border-top: 0.5px solid #e0e0e0;
            padding-top: 10px;
        }

        /* 3. 框框窄化：對齊要求縮小寬度 */
        .form-v3 { padding: 25px; background-color: #ffffff; }
        .label-v3 { font-size: 14px; font-weight: bold; display: block; margin-bottom: 8px; color: #4a3c31; }
        
        .input-v3 { 
            width: 75% !important; /* 強制縮窄至 75% */
            max-width: 300px;
            box-sizing: border-box; 
            border: 1px solid #e0e0e0; 
            border-radius: 8px; 
            padding: 10px 15px; 
            font-size: 13px;   
            margin-bottom: 20px; 
            outline: none; 
            background: #fdfdfd;
            color: #4a3c31;
        }
        
        .row-v3 { display: flex; gap: 15px; width: 75%; max-width: 300px; }
        .col-v3 { flex: 1; }
        .col-v3 .input-v3 { width: 100% !important; }

        .btn-v3 { 
            width: 75%; 
            max-width: 300px;
            background-color: #4a3c31; 
            color: white; 
            border: none; 
            padding: 12px; 
            font-size: 14px; 
            font-weight: bold; 
            border-radius: 5px; 
            cursor: pointer; 
        }
    </style>
</head>
<body>

    <div class="header-v3">
        <div class="limit-v3">
            <div class="title-main">跑者服務中心</div>
            <div class="title-sub">RUNNER SERVICE CENTER</div>
            
            <div class="slogan-v3">讓我們聽見您的腳步聲</div>
            
            <p class="p-v3">無論您是因為突破個人最佳成績而興奮，亦或是正處於受傷低潮，有任何想回饋的想法，歡迎隨時聯繫我們唷 ◡̈</p>
            <p class="p-v3">您的回饋是我們進化的動力，您的提問是我們探索的方向，若您在訓練的路上遇到瓶頸，或者發現我們能做得更好的地方，請告訴我們。</p>
            <p class="p-v3">讓我們一起朝更好的自己邁進，讓這份對跑步的熱愛，連結起每一個熱血的靈魂。希望這裡不只是網站，更是跑者們的補給站。</p>
            
            <div class="hours-v3">✻ 服務時間：週一至週五 09:00 - 18:00 (跑者不休息，但小編需要一些運動時間)</div>
        </div>
    </div>

    <div class="form-v3">
        <div class="limit-v3">
            <label class="label-v3">姓名 / Name</label>
            <input type="text" class="input-v3" placeholder="請輸入您的姓名">
            
            <label class="label-v3">電子信箱 / E-mail</label>
            <input type="email" class="input-v3" placeholder="runner@example.com">

            <label class="label-v3">跑者屬性</label>
            <select class="input-v3">
                <option>新手跑者</option>
                <option>馬拉松選手</option>
            </select>

            <div class="row-v3">
                <div class="col-v3">
                    <label class="label-v3">跑步最佳成績 (PB)</label>
                    <input type="text" class="input-v3" placeholder="例如：全馬3:30:00">
                </div>
                <div class="col-v3">
                    <label class="label-v3">目標成績</label>
                    <input type="text" class="input-v3" placeholder="例如：全馬2:59:59">
                </div>
            </div>

            <label class="label-v3">慣用穿戴配備</label>
            <input type="text" class="input-v3" placeholder="例如：Garmin, Apple Watch, Coros">

            <label class="label-v3">您的問題</label>
            <textarea class="input-v3" style="height: 100px; width: 85% !important;" placeholder="每一滴汗水，都值得被聽見..."></textarea>
            
            <button type="submit" class="btn-v3">送出表單</button>
        </div>
    </div>

</body>
</html>
