    function showHideDiv() {
      var showHideDiv = document.getElementById("myDiv");
      var showBtn = document.getElementById("showBtn");

      if (showHideDiv.style.display == "none") {
        showHideDiv.style.display = "block";
        showBtn.style.display = "none";
      }
      else {
        showHideDiv.style.display = "none";
        showBtn.style.display = "block";
      }
    }

  </script>

      animation-name: logo_animation;

      animation-iteration-count: infinite;
    }

    #after {
      width: 300px;
      height: 300px;
      animation-name: logo_animation;
      animation-duration: 2s;
      animation-iteration-count: infinite;
    }

    #stick {
      width: 20px;
      /* transition: 1.5s; */
      transform: translate(140px, 60px) rotate(-6deg);
    }

    #stick:active {
      /* transform: translate(140px, 30px) rotate(6deg); */
      animation-name: subAni;
      animation-duration: 5s;
      animation-iteration-count: 1;
      
    }
    
    @keyframes subAni {
      0% {
        transform: translate(140px,60px);
      }
      25% {
        transform: translate(140px,-100px);
      }
      50%{/*50%-100%效果一樣，花一半時間停止  */
        transform: translate(500px,300px) scale(3) ;
      }
      100%{
        transform: translate(500px,300px) scale(3) ;
      }
    }

    @keyframes logo_animation {
      0% {
        transform: rotate(0deg);
      }

      }

      50% {
        transform: rotate(-15deg);
      }

      75% {
        transform: rotate(15deg);
      }

      100% {
        transform: rotate(0deg);
      }
    }

  <!-- 點擊觸發 fntime，並傳入停止秒數 5 -->
  <input type="button" value="開始計時 (5秒後自動停止)" onclick="fntime()">
  <input type="button" value="手動停止" onclick="stopClock()">

  <h1 id="display">0</h1>

  <script>
    let timer = null;
    let count = 0;

    setInterval(fntime, 1000);

    function fntime() {
      // 1. 如果已經在計時，先清除舊的，避免重複啟動加速
      //if (timer !== null) clearInterval(timer);

      // 2. 重置數字（看你需求，是否每次都從 0 開始）
      count++;
      document.getElementById('display').innerText = count;

      // 3. 啟動定時器

      document.getElementById('display').innerText = count;


    }



    function fntimea(stopSecond) {
      // 1. 如果已經在計時，先清除舊的，避免重複啟動加速
      if (timer !== null) clearInterval(timer);

      // 2. 重置數字（看你需求，是否每次都從 0 開始）
      count = 0;
      document.getElementById('display').innerText = count;

      // 3. 啟動定時器
      timer = setInterval(() => {
        count++;
        document.getElementById('display').innerText = count;

        // 4. 判斷是否到達參數設定的秒數
        if (count >= stopSecond) {
          stopClock();
          alert("時間到！自動停止");
        }
      }, 1000);
    }

    function stopClock() {
      clearInterval(timer);
      timer = null;
    }
  </script>

  <h1 class="flash-text">CSS我會變色喔！</h1>

  <h1 id="myText">JS我會變色喔！</h1>

  <script>
    /**/
    const text = document.getElementById('myText');

    setInterval(() => {
      // 判斷目前顏色，如果是黑色就變紅，否則變黑
      if (text.style.color === 'black' || text.style.color === '') {
        text.style.color = 'red';
      } else {
        text.style.color = 'black';
      }
    }, 1000); // 每秒切換一次

  </script>
