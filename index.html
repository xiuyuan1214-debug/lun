<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>跑者服務中心 Runner Service Center</title>
    <style>
        body { margin: 0; padding: 0; font-family: -apple-system, "Noto Sans TC", sans-serif; background-color: #ffffff; color: #4a3c31; }
        
        /* 標題區域：加回完整英文並恢復原狀 */
        .header-section { background-color: #fff9e6; padding: 12px 10px 8px 10px; text-align: center; width: 100%; box-sizing: border-box; }
        
        /* 極限縮小容器寬度（恢復您要求的窄版） */
        .content-limit { max-width: 280px; margin: 0 auto; text-align: left; } 
        
        /* 恢復標題原狀 */
        .title-main { font-size: 18px; font-weight: bold; margin-bottom: 2px; text-align: center; color: #2d241d; }
        .title-sub { font-size: 11px; text-align: center; color: #b5a48d; margin-bottom: 12px; font-weight: normal; }
        
        .intro-p { font-size: 11px; line-height: 1.4; margin-bottom: 4px; color: #4a3c31; }
        
        /* --- 服務時間：極致微縮方案 (0.4倍) --- */
        .service-hours { 
            font-size: 10px !important; 
            color: #b5a48d; 
            margin-top: 5px; 
            display: inline-block;
            transform: scale(0.4); 
            transform-origin: left top;
            opacity: 0.4;
            white-space: nowrap;
        }

        /* --- 框框與表單：極度窄版化 --- */
        .form-section { padding: 5px 10px; }
        .field-label { font-size: 9px; font-weight: bold; display: block; margin-bottom: 2px; color: #4a3c31; }
        
        .input-box { 
            width: 100%;       
            box-sizing: border-box; 
            border: 1px solid #eeeeee; 
            border-radius: 2px; 
            padding: 3px 6px;   
            font-size: 11px;    
            margin-bottom: 6px; 
            outline: none; 
            background: #fff;
            height: 24px; 
        }
        
        textarea.input-box { height: auto; min-height: 40px; }
        
        .submit-btn { 
            width: 100%; 
            background-color: #4a3c31; 
            color: white; 
            border: none; 
            padding: 6px; 
            font-size: 12px; 
            font-weight: bold; 
            border-radius: 3px; 
            cursor: pointer; 
        }

        .captcha-row { display: flex; align-items: center; gap: 5px; margin-bottom: 6px; }
        .captcha-code { background-color: #f2ede4; padding: 2px 6px; border-radius: 3px; font-weight: bold; font-size: 11px; }
    </style>
</head>
<body>

    <!-- 由外部載入的導覽列 -->
    <div id="navBar"></div>

    <div class="header-section">
        <div class="content-limit">
            <div class="title-main">跑者服務中心</div>
            <div class="title-sub">Runner Service Center</div>
            
            <p class="intro-p">無論突破成績或處於低潮，歡迎聯繫我們唷 ◡̈</p>
            <p class="intro-p">您的回饋是我們進化的動力，這裡是跑者的補給站。</p>
            
            <!-- 服務時間極微縮小 -->
            <div class="service-hours">☀️服務時間：週一至週五 09:00 - 18:00 (跑者不休息，但小編需要一些運動時間)</div>
        </div>
    </div>

    <div class="form-section">
        <div class="content-limit">
            <label class="field-label">姓名 / Name</label>
            <input type="text" class="input-box">
            
            <label class="field-label">電子信箱 / E-mail</label>
            <input type="email" class="input-box">

            <label class="field-label">您的問題 / Your Inquiry</label>
            <textarea class="input-box" rows="2"></textarea>
            
            <div class="captcha-row">
                <input type="text" class="input-box" style="width: 50px; margin-bottom: 0;">
                <div class="captcha-code">A 5 2 G</div>
            </div>

            <button type="submit" class="submit-btn">送出表單 / Submit</button>
        </div>
    </div>

    <!-- 啟動 JS 選單連結 -->
    <script src="nav_bar.js"></script>
</body>
</html>
