<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --cream-bg: #FFF9D7;      
            --cream-shadow: #F8E9A1;  
            --color-zh: #5D4037;       
            --color-en: #8D6E63;       
            --color-slogan: #E67E22;   
            --form-label: #7A6652;    
            --form-main: #3D352F;
            --input-border: #E8E8E8; 
            --input-bg: #FCFAF2;     
        }

        body {
            font-family: -apple-system, "PingFang TC", "Microsoft JhengHei", sans-serif;
            margin: 0;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content-wrapper {
            width: 100%;
            max-width: 320px; 
            padding: 0;
            box-sizing: border-box;
        }

        /* 嚴格復原 IMG_5518_2.jpg 的蛋形大半圓奶黃底 */
        .runner-header {
            background-color: var(--cream-bg);
            /* 關鍵：重現巨大的蛋形弧度 */
            border-radius: 50% 50% 50% 50% / 40% 40% 12% 12%;
            padding: 65px 25px 60px 25px;
            position: relative;
            text-align: center;
            box-shadow: 0 12px 0 var(--cream-shadow);
            margin: 20px 0 0 0;
        }

        .title-zh {
            color: var(--color-zh);
            font-size: 24px;
            margin: 0;
            font-weight: 900;
            letter-spacing: 2px;
        }

        .title-en {
            color: var(--color-en);
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 3px;
            margin-top: 10px;
            margin-bottom: 25px;
        }

        .title-slogan {
            color: var(--color-slogan);
            font-size: 18px;
            font-weight: 800;
            margin-bottom: 25px;
            background: #ffffff;
            display: inline-block;
            padding: 6px 20px;
            border-radius: 30px;
        }

        .runner-header p {
            font-size: 12px;
            line-height: 1.8;
            color: var(--color-zh);
            margin: 8px 0;
            font-weight: 500;
            text-align: left;
        }

        .footer-info {
            font-size: 9px;
            color: #968370;
            margin-top: 20px;
            border-top: 1px solid rgba(0,0,0,0.1);
            padding-top: 12px;
            text-align: center;
            line-height: 1.5;
        }

        .form-container {
            background-color: #ffffff;
            margin-top: -35px;
            padding: 60px 10px 40px 10px;
            position: relative;
            z-index: 10;
        }

        .form-group { margin-bottom: 22px; }

        label {
            display: block;
            font-size: 15px;
            font-weight: bold;
            color: var(--form-label);
            margin-bottom: 10px;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--input-border);
            border-radius: 12px;
            font-size: 14px;
            background-color: var(--input-bg);
            color: var(--form-main);
            box-sizing: border-box;
            outline: none;
        }

        textarea { height: 100px; resize: none; }

        /* 驗證碼區塊極窄化 */
        .captcha-container {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .captcha-input { 
            width: 50px !important; 
            padding: 10px 5px !important;
            text-align: center;
        }
        .captcha-box {
            background-color: #F8F5F0;
            padding: 8px 10px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 15px;
            letter-spacing: 1px;
            color: var(--form-main);
            border: 1px solid #EFEAE4;
            min-width: 55px;
            text-align: center;
        }

        .refresh-btn {
            background: none; border: none; cursor: pointer;
            padding: 5px; display: flex; align-items: center;
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background-color: #4f433a;
            color: #ffffff;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="content-wrapper">
        <div class="runner-header">
            <h1 class="title-zh">跑者服務中心</h1>
            <div class="title-en">RUNNER SERVICE CENTER</div>
            <div class="title-slogan">讓我們聽見您の腳步聲</div>
            
            <p>無論您是因為突破個人最佳成績而興奮，亦或是正處於受傷低潮，歡迎聯繫我們唷 😉</p>
            <p>您的回饋是我們進化的動力。希望這裡不只是網站，更是跑者們的補給站。</p>
            
            <div class="footer-info">✻ 服務時間：週一至週五 09:00 - 18:00 (小編也需要運動時間)</div>
        </div>

        <div class="form-container">
            <form>
                <div class="form-group">
                    <label>姓名 / Name</label>
                    <input type="text" placeholder="請輸入您的姓名">
                </div>
                <div class="form-group">
                    <label>電子信箱 / E-mail</label>
                    <input type="email" placeholder="runner@gmail.com">
                </div>
                <div class="form-group">
                    <label>跑者屬性 / Runner Type</label>
                    <select>
                        <option value="" disabled selected>請選擇 / Please Select</option>
                        <option value="beginner">新手跑者 / Beginner Runner</option>
                        <option value="half-marathon">半馬跑者 / Half Marathoner</option>
                        <option value="marathon">全馬跑者 / Marathoner</option>
                        <option value="ultra-trail">超馬/越野跑者 / Ultra & Trail Runner</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>最佳成績 / Personal Best</label>
                    <input type="text" placeholder="例如：全馬3:30:00">
                </div>
                <div class="form-group">
                    <label>目標成績 / Target Goal</label>
                    <input type="text" placeholder="例如：全馬2:59:59">
                </div>
                <div class="form-group">
                    <label>穿戴配備 / Wearable Device</label>
                    <input type="text" placeholder="例如：Garmin, Apple Watch, Coros">
                </div>
                <div class="form-group">
                    <label>您的問題 / Your Inquiry</label>
                    <textarea placeholder="每一滴汗水，都值得被聽見..."></textarea>
                </div>
                <div class="form-group">
                    <label>驗證碼 / Verification Code</label>
                    <div class="captcha-container">
                        <input type="text" class="captcha-input" placeholder="代碼">
                        <div id="captchaCode" class="captcha-box">7W8Q</div>
                        <button type="button" class="refresh-btn" onclick="refreshCaptcha()">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#B8B0A8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M23 4v6h-6"></path>
                                <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
                            </svg>
                        </button>
                    </div>
                </div>
                <button type="submit" class="submit-btn">送出表單 / Submit</button>
            </form>
        </div>
    </div>

    <script>
        function refreshCaptcha() {
            const chars = '23456789ABCDEFGHJKLMNPQRSTUVWXYZ';
            let newCode = '';
            for (let i = 0; i < 4; i++) {
                newCode += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            document.getElementById('captchaCode').innerText = newCode;
        }
    </script>
</body>
</html>
