<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>跑者服務中心</title>
    <style>
        :root {
            --primary-brown: #8B7355;
            --light-bg: #FDF9E7;
            --text-gray: #4A4A4A;
            --btn-bg: #4f433a;
            --track-yellow: #e6d8ad;
            /* 根據圖片提取的顏色 */
            --input-border: #E8E5D8; 
            --placeholder-color: #C2C2C2;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Microsoft JhengHei", sans-serif;
            background-color: #fff;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }

        .main-container {
            width: 100%;
            max-width: 100%;
            background-color: #fff;
            min-height: 100vh;
        }

        .runner-header {
            background-color: var(--light-bg);
            padding: 40px 10% 60px 10%;
            position: relative;
            color: #5d5348;
            border-bottom-left-radius: 40px; 
        }

        .runner-header::before {
            content: "";
            position: absolute;
            left: 0;
            top: 0;
            bottom: 40px;
            width: 10px;
            background: linear-gradient(
                to bottom,
                var(--track-yellow) 0%,
                var(--track-yellow) 50%,
                var(--primary-brown) 50%,
                var(--primary-brown) 100%
            );
            background-size: 100% 30px;
            border-right: 3px solid var(--track-yellow);
        }

        .runner-header h1 { color: var(--primary-brown); margin: 0; font-size: 24px; text-align: center; }
        .runner-header .en-title { color: #c0b283; font-size: 12px; letter-spacing: 1px; margin-bottom: 25px; text-align: center; }
        .runner-header .highlight { color: var(--primary-brown); font-weight: bold; font-size: 16px; margin-bottom: 15px; }
        .runner-header p { font-size: 14px; line-height: 1.6; margin: 10px 0; }
        .runner-header .footer-info { font-size: 11px; color: #a0937d; margin-top: 25px; }

        .form-container {
            padding: 40px 10%;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            position: relative;
            margin-top: -30px;
            border-top-left-radius: 40px;
            border-top-right-radius: 40px;
            box-shadow: 0 -10px 20px rgba(0,0,0,0.02);
        }

        form { width: 100%; max-width: 800px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; font-size: 16px; color: var(--primary-brown); margin-bottom: 8px; }

        /* 修改重點：輸入框顏色與圖片完全一致 */
        input, select, textarea {
            width: 100%;
            padding: 10px 15px;
            border: 1px solid var(--input-border); /* 配合圖片的邊框色 */
            border-radius: 12px;
            background-color: #fff;
            font-size: 14px;
            box-sizing: border-box;
            outline: none;
            color: var(--text-gray); /* 輸入後的文字顏色 */
        }

        /* 修正：Placeholder 顏色 */
        input::placeholder, textarea::placeholder { 
            color: var(--placeholder-color); 
        }

        textarea { height: 80px; resize: none; border-radius: 15px; }

        .captcha-area { display: flex; align-items: center; gap: 12px; }
        .captcha-input { width: 100px !important; }
        .captcha-code-box {
            background-color: #f3efe9;
            padding: 6px 18px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 16px;
            letter-spacing: 3px;
            color: #4A4A4A;
            cursor: pointer;
        }

        .refresh-btn { color: #bbb; font-size: 20px; border: none; background: none; }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background-color: var(--btn-bg);
            color: #ffffff;
            border: none;
            border-radius: 10px;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        @media (max-width: 600px) {
            .runner-header, .form-container { padding-left: 20px; padding-right: 20px; }
        }
    </style>
</head>
<body>

<div class="main-container">
    <div class="runner-header">
        <h1>跑者服務中心</h1>
        <div class="en-title">RUNNER SERVICE CENTER</div>
        <div class="highlight">讓我們聽見您的腳步聲</div>
        <p>無論您是因為突破個人最佳成績而興奮，亦或是正處於受傷低潮，有任何想回饋的想法，歡迎隨時聯繫我們唷 ☺</p>
        <p>您的回饋是我們進化的動力，您的提問是我們探索的方向，若您在訓練的路上遇到瓶頸，或者發現我們能做得更好的地方，請告訴我們。</p>
        <p>讓我們一起朝更好的自己邁進，讓這份對跑步熱愛，連結起每一個熱血的靈魂。希望這裡不只是網站，更是跑者們的補給站。</p>
        <div class="footer-info">☀ 服務時間：週一至週五 09:00 - 18:00 (跑者不休息，但小編需要一些運動時間)</div>
    </div>

    <div class="form-container">
        <form>
            <div class="form-group">
                <label>姓名 / Name</label>
                <input type="text" placeholder="請輸入您的姓名">
            </div>

            <div class="form-group">
                <label>電子信箱 / E-mail</label>
                <input type="email" placeholder="runner@example.com">
            </div>

            <div class="form-group">
                <label>跑者屬性</label>
                <select>
                    <option disabled selected>請選擇</option>
                    <option>新手跑者</option>
                    <option>馬拉松跑者</option>
                </select>
            </div>

            <div class="form-group">
                <label>跑步最佳成績 (PB)</label>
                <input type="text" placeholder="例如：全馬3:30:00">
            </div>

            <div class="form-group">
                <label>慣用穿戴配備</label>
                <input type="text" placeholder="例如：Garmin, Apple Watch, Coros">
            </div>

            <div class="form-group">
                <label>您的問題</label>
                <textarea placeholder="每一滴汗水，都值得被聽見..."></textarea>
            </div>

            <div class="form-group">
                <label>驗證碼</label>
                <div class="captcha-area">
                    <input type="text" class="captcha-input" placeholder="輸入碼">
                    <div id="captchaCode" class="captcha-code-box" onclick="generateCaptcha()">7W8Q</div>
                    <button type="button" class="refresh-btn" onclick="generateCaptcha()">↻</button>
                </div>
            </div>

            <button type="submit" class="submit-btn">送出表單 / Submit</button>
        </form>
    </div>
</div>

<script>
    function generateCaptcha() {
        const chars = '23456789ABCDEFGHJKLMNPQRSTUVWXYZ';
        let result = '';
        for (let i = 0; i < 4; i++) {
            result += chars.charAt(Math.floor(Math.random() * chars.length));
        }
        document.getElementById('captchaCode').innerText = result;
    }
</script>

</body>
</html>
