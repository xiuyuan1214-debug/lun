<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --primary-brown: #8B7355; 
            --refined-yellow: #F9D11F; /* 降低螢光感，改為較厚實的質感黃 */
            --accent-border: #C69C00;   /* 邊框深金色 */
            --label-brown: #7A6652;  
            --input-border: #F2F2F2; 
            --input-bg: #FDFDF8;     
        }

        body {
            font-family: -apple-system, "PingFang TC", "Microsoft JhengHei", sans-serif;
            margin: 0;
            background-color: #ffffff;
        }

        /* 調整後的黃底框框：強化邊框特色 */
        .runner-header {
            background-color: var(--refined-yellow);
            padding: 45px 30px 60px 45px;
            position: relative;
            /* 特色 1：雙重左側邊界，內含深色點綴線 */
            border-left: 16px solid var(--accent-border);
            /* 特色 2：底部加入細緻的深色陰影線增加立體感 */
            border-bottom: 5px solid rgba(0,0,0,0.1);
            /* 特色 3：大跨度的動態圓角設計 */
            border-bottom-left-radius: 90px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
            margin-bottom: 0;
        }

        .runner-header h1 {
            color: #43382c;
            font-size: 26px;
            margin: 0;
            font-weight: 900;
        }

        .en-title {
            color: #8B7355;
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 2px;
            margin-top: 5px;
            margin-bottom: 30px;
        }

        .highlight {
            color: #43382c;
            font-size: 16px;
            font-weight: 800;
            margin-bottom: 20px;
        }

        .runner-header p {
            font-size: 14px;
            line-height: 1.8;
            color: #43382c;
            margin: 15px 0;
            font-weight: 500;
        }

        .footer-info {
            font-size: 10px;
            color: #7A6652;
            margin-top: 35px;
            border-top: 1px solid rgba(0,0,0,0.1);
            padding-top: 15px;
        }

        /* 表單區域 - 絕對不動 */
        .form-container {
            background-color: #ffffff;
            margin-top: -40px;
            padding: 50px 30px;
            border-top-left-radius: 40px;
            border-top-right-radius: 40px;
            position: relative;
            z-index: 10;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            font-size: 18px;
            font-weight: bold;
            color: var(--label-brown);
            margin-bottom: 12px;
        }

        input, select, textarea {
            width: 100%;
            padding: 14px 20px;
            border: 1px solid var(--input-border);
            border-radius: 14px;
            font-size: 14px;
            background-color: var(--input-bg);
            color: #4A4A4A;
            box-sizing: border-box;
            outline: none;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.02);
        }

        textarea { height: 130px; resize: none; }

        .captcha-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .captcha-input { width: 110px !important; }
        .captcha-box {
            background-color: #F5F1E9;
            padding: 10px 25px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 22px;
            letter-spacing: 5px;
            color: #444;
            flex-shrink: 0;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background-color: #4f433a;
            color: #ffffff;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="runner-header">
        <h1>跑者服務中心</h1>
        <div class="en-title">RUNNER SERVICE CENTER</div>
        <div class="highlight">讓我們聽見您的腳步聲</div>
        <p>無論您是因為突破個人最佳成績而興奮，亦或是正處於受傷低潮，有任何想回饋的想法，歡迎隨時聯繫我們唷 ☺</p>
        <p>您的回饋是我們進化的動力，您的提問是我們探索的方向，若您在訓練的路上遇到瓶頸，或者發現我們能做得更好的地方，請告訴我們。</p>
        <p>讓我們一起朝更好的自己邁進，讓這份對跑步熱愛，連結起每一個熱血的靈魂。希望這裡不只是網站，更是跑者們的補給站。</p>
        <div class="footer-info">✻ 服務時間：週一至週五 09:00 - 18:00 (跑者不休息，但小編需要一些運動時間)</div>
    </div>

    <div class="form-container">
        <form>
            <div class="form-group">
                <label>姓名 / Name</label>
                <input type="text" placeholder="請輸入您的姓名">
            </div>

            <div class="form-group">
                <label>電子信箱 / E-mail</label>
                <input type="email" placeholder="runner@gmail.com">
            </div>

            <div class="form-group">
                <label>跑者屬性 / Runner Type</label>
                <select>
                    <option value="" disabled selected>請選擇 / Please Select</option>
                    <option value="beginner">新手跑者 / Beginner Runner</option>
                    <option value="half-marathon">半馬跑者 / Half Marathoner</option>
                    <option value="marathon">全馬跑者 / Marathoner</option>
                    <option value="ultra-trail">超馬/越野跑者 / Ultra & Trail Runner</option>
                </select>
            </div>

            <div class="form-group">
                <label>最佳成績 / Personal Best</label>
                <input type="text" placeholder="例如：全馬3:30:00">
            </div>

            <div class="form-group">
                <label>目標成績 / Target Goal</label>
                <input type="text" placeholder="例如：全馬2:59:59">
            </div>

            <div class="form-group">
                <label>穿戴配備 / Wearable Device</label>
                <input type="text" placeholder="例如：Garmin, Apple Watch, Coros">
            </div>

            <div class="form-group">
                <label>您的問題 / Your Inquiry</label>
                <textarea placeholder="每一滴汗水，都值得被聽見..."></textarea>
            </div>

            <div class="form-group">
                <label>驗證碼 / Verification Code</label>
                <div class="captcha-container">
                    <input type="text" class="captcha-input" placeholder="輸入碼">
                    <div class="captcha-box">C M 5 F</div>
                </div>
            </div>

            <button type="submit" class="submit-btn">送出表單 / Submit</button>
        </form>
    </div>

</body>
</html>
