<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --cream-bg: #FFF9D7;      
            --cream-shadow: #F8E9A1;  
            --color-zh: #5D4037;       
            --color-en: #8D6E63;       
            --color-slogan: #E67E22;   
            --form-label: #7A6652;    
            --form-main: #3D352F;
            --input-border: #E8E8E8; 
            --input-bg: #FCFAF2;     
        }

        body {
            font-family: -apple-system, "PingFang TC", "Microsoft JhengHei", sans-serif;
            margin: 0;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 全域框度設定：保持窄版且不擠壓形狀 */
        .content-wrapper {
            width: 100%;
            max-width: 320px; 
            padding: 0;
            box-sizing: border-box;
        }

        /* 奶黃底蛋形狀：根據 IMG_5518_4.jpg 嚴格復原 */
        .runner-header {
            background-color: var(--cream-bg);
            /* 關鍵：巨大的圓潤半圓弧度 */
            border-radius: 50% 50% 50% 50% / 35% 35% 15% 15%;
            padding: 60px 25px 65px 25px;
            position: relative;
            text-align: center;
            box-shadow: 0 12px 0 var(--cream-shadow);
            margin: 20px 0 0 0;
        }

        .title-zh {
            color: var(--color-zh);
            font-size: 24px;
            margin: 0;
            font-weight: 900;
            letter-spacing: 2px;
        }

        .title-en {
            color: var(--color-en);
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 3px;
            margin: 10px 0 20px 0;
        }

        .title-slogan {
            color: var(--color-slogan);
            font-size: 18px;
            font-weight: 800;
            margin-bottom: 25px;
            background: #ffffff;
            display: inline-block;
            padding: 6px 20px;
            border-radius: 30px;
        }

        .runner-header p {
            font-size: 12px;
            line-height: 1.8;
            color: var(--color-zh);
            margin: 8px 0;
            font-weight: 500;
            text-align: left;
        }

        .form-container {
            background-color: #ffffff;
            margin-top: -40px; /* 覆蓋在奶黃底上的深度 */
            padding: 60px 15px 40px 15px;
            position: relative;
            z-index: 10;
        }

        .form-group { margin-bottom: 22px; }

        label {
            display: block;
            font-size: 15px;
            font-weight: bold;
            color: var(--form-label);
            margin-bottom: 10px;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--input-border);
            border-radius: 12px;
            font-size: 14px;
            background-color: var(--input-bg);
            color: var(--form-main);
            box-sizing: border-box;
            outline: none;
        }

        textarea { height: 100px; resize: none; }

        /* 驗證碼框度極致縮小 */
        .captcha-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .captcha-input { 
            width: 50px !important; /* 精確指定為 50px */
            padding: 10px 0 !important;
            text-align: center;
            border-radius: 12px;
        }

        .captcha-box {
            background-color: #F8F5F0;
            padding: 10px 15px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 16px;
            letter-spacing: 2px;
            color: var(--form-main);
            border: 1px solid #EFEAE4;
            min-width: 60px;
            text-align: center;
        }

        .refresh-btn {
            background: none; border: none; cursor: pointer;
            padding: 5px; display: flex; align-items: center;
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background-color: #4f433a;
            color: #ffffff;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="content-wrapper">
        <div class="runner-header">
            <h1 class="title-zh">跑者服務中心</h1>
            <div class="title-en">RUNNER SERVICE CENTER</div>
            <div class="title-slogan">讓我們聽見您の腳步聲</div>
            
            <p>無論您是因為突破個人最佳成績而興奮，亦或是正處於受傷低潮，歡迎聯繫我們唷 😉</p>
            <p>您的回饋是我們進化的動力。希望這裡不只是網站，更是跑者們的補給站。</p>
        </div>

        <div class="form-container">
            <form>
                <div class="form-group">
                    <label>姓名 / Name</label>
                    <input type="text" placeholder="請輸入您的姓名">
                </div>
                <div class="form-group">
                    <label>電子信箱 / E-mail</label>
                    <input type="email" placeholder="runner@gmail.com">
                </div>
                <div class="form-group">
                    <label>您的問題 / Your Inquiry</label>
                    <textarea placeholder="每一滴汗水，都值得被聽見..."></textarea>
                </div>
                
                <div class="form-group">
                    <label>驗證碼 / Verification Code</label>
                    <div class="captcha-container">
                        <!-- placeholder 嚴格使用「輸入碼」 -->
                        <input type="text" class="captcha-input" placeholder="輸入碼">
                        <div id="captchaCode" class="captcha-box">7W8Q</div>
                        <button type="button" class="refresh-btn" onclick="refreshCaptcha()">
                            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#B8B0A8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M23 4v6h-6"></path>
                                <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
                            </svg>
                        </button>
                    </div>
                </div>
                <button type="submit" class="submit-btn">送出表單 / Submit</button>
            </form>
        </div>
    </div>

    <script>
        function refreshCaptcha() {
            const chars = '23456789ABCDEFGHJKLMNPQRSTUVWXYZ';
            let newCode = '';
            for (let i = 0; i < 4; i++) {
                newCode += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            document.getElementById('captchaCode').innerText = newCode;
        }
    </script>
</body>
</html>
