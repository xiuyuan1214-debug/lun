<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>跑者服務中心 - Runner Service Center</title>
    <style>
        :root {
            --primary-brown: #8B7355;
            --light-bg: #FDF9E7;
            --card-bg: #FFFFFF;
            --text-color: #5D5348;
            --border-color: #E0E0E0;
        }

        body {
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            background-color: #F5F5F5;
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 20px;
            color: var(--text-color);
        }

        .container {
            width: 100%;
            max-width: 600px;
            background-color: var(--light-bg);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .header-section {
            padding: 30px;
            border-left: 8px solid #E6D8AD;
        }

        h1 { color: var(--primary-brown); margin: 0; font-size: 24px; }
        .subtitle { color: #C0B283; font-size: 12px; letter-spacing: 2px; margin-bottom: 20px; }

        .form-section {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 25px 25px 0 0;
        }

        .form-group { margin-bottom: 20px; }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            color: var(--primary-brown);
            font-size: 15px;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-sizing: border-box;
            background-color: #FAFAFA;
            font-size: 14px;
        }

        .row { display: flex; gap: 15px; }
        .row .form-group { flex: 1; }

        /* 驗證碼樣式 */
        .captcha-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .captcha-code {
            background: #EEE;
            padding: 10px 15px;
            font-weight: bold;
            letter-spacing: 3px;
            user-select: none;
            background-image: linear-gradient(45deg, #ddd 25%, transparent 25%), linear-gradient(-45deg, #ddd 25%, transparent 25%);
            background-size: 10px 10px;
            border-radius: 4px;
            color: #555;
        }

        .submit-btn {
            background-color: var(--primary-brown);
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }
        .submit-btn:hover { background-color: #6F5B42; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-section">
        <h1>跑者服務中心</h1>
        <div class="subtitle">RUNNER SERVICE CENTER</div>
        <p>讓我們聽見您的腳步聲，連結起每一個熱血的靈魂。</p>
    </div>

    <div class="form-section">
        <form>
            <!-- 姓名 -->
            <div class="form-group">
                <label>姓名 / Name</label>
                <input type="text" placeholder="Enter your full name">
            </div>

            <!-- 電子信箱 -->
            <div class="form-group">
                <label>電子信箱 / E-mail</label>
                <input type="email" placeholder="example@runner.com">
            </div>

            <!-- 跑者屬性 -->
            <div class="form-group">
                <label>跑者屬性 / Runner Type</label>
                <select>
                    <option value="" disabled selected>Select your runner level</option>
                    <option value="beginner">新手跑者 / Beginner</option>
                    <option value="half-marathon">半馬跑者 / Half Marathoner</option>
                    <option value="full-marathon">全馬跑者 / Full Marathoner</option>
                    <option value="ultra-trail">超馬、越野跑者 / Ultra & Trail Runner</option>
                </select>
            </div>

            <!-- 成績行 -->
            <div class="row">
                <div class="form-group">
                    <label>最佳成績 / Personal Best</label>
                    <input type="text" placeholder="e.g. Marathon 3:30:00">
                </div>
                <div class="form-group">
                    <label>目標成績 / Goal Time</label>
                    <input type="text" placeholder="e.g. Marathon 2:59:59">
                </div>
            </div>

            <!-- 穿戴配備 -->
            <div class="form-group">
                <label>穿戴配備 / Gear & Wearables</label>
                <input type="text" placeholder="e.g. Garmin Forerunner 955, Coros Pace 3">
            </div>

            <!-- 您的問題 -->
            <div class="form-group">
                <label>您的問題 / Inquiry or Feedback</label>
                <textarea placeholder="How can we help you on your running journey?"></textarea>
            </div>

            <!-- 驗證碼 -->
            <div class="form-group">
                <label>驗證碼 / Verification Code</label>
                <div class="captcha-container">
                    <div class="captcha-code">R 8 N 2</div>
                    <input type="text" style="flex: 1;" placeholder="Enter code">
                </div>
                <small style="color: #999; font-size: 11px;">Anti-bot verification</small>
            </div>

            <button type="submit" class="submit-btn">送出訊息 / Submit</button>
        </form>
    </div>
</div>

</body>
</html>
