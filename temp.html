<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            /* 淡雅奶黃底色 */
            --cream-bg: #FFF9D7;      
            --cream-shadow: #F8E9A1;  
            
            --color-zh: #5D4037;       
            --color-en: #8D6E63;       
            --color-slogan: #E67E22;   
            
            --form-label: #7A6652;    
            --form-main: #3D352F;
            /* 調整框線顏色與輸入框底色 */
            --input-border: #E8E8E8; 
            --input-bg: #FCFAF2;     
        }

        body {
            font-family: -apple-system, "PingFang TC", "Microsoft JhengHei", sans-serif;
            margin: 0;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 內容寬度縮小至 500px */
        .content-wrapper {
            width: 100%;
            max-width: 500px; 
        }

        /* 奶油黃區塊 */
        .runner-header {
            background-color: var(--cream-bg);
            border-radius: 150px; 
            padding: 50px 30px 55px 30px;
            position: relative;
            text-align: center;
            box-shadow: 0 15px 0 var(--cream-shadow), 0 30px 40px rgba(0,0,0,0.08);
            margin: 20px 15px 0 15px;
        }

        .title-zh {
            color: var(--color-zh);
            font-size: 26px;
            margin: 0;
            font-weight: 900;
            letter-spacing: 2px;
        }

        .title-en {
            color: var(--color-en);
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 4px;
            margin-top: 10px;
            margin-bottom: 25px;
        }

        .title-slogan {
            color: var(--color-slogan);
            font-size: 18px;
            font-weight: 800;
            margin-bottom: 20px;
            background: rgba(255,255,255,0.6);
            display: inline-block;
            padding: 5px 20px;
            border-radius: 20px;
        }

        .runner-header p {
            font-size: 13px;
            line-height: 1.8;
            color: var(--color-zh);
            margin: 8px 0;
            font-weight: 500;
            text-align: left;
        }

        .footer-info {
            font-size: 10px;
            color: #968370;
            margin-top: 12px;
            border-top: 1px solid rgba(0,0,0,0.05);
            padding-top: 10px;
            text-align: center;
        }

        /* 表單區域 */
        .form-container {
            background-color: #ffffff;
            margin-top: -45px;
            padding: 60px 25px 40px 25px;
            border-top-left-radius: 50px;
            border-top-right-radius: 50px;
            position: relative;
            z-index: 10;
        }

        .form-group { margin-bottom: 25px; }

        label {
            display: block;
            font-size: 17px;
            font-weight: bold;
            color: var(--form-label);
            margin-bottom: 12px;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px 18px;
            border: 1px solid var(--input-border);
            border-radius: 12px;
            font-size: 14px;
            background-color: var(--input-bg);
            color: var(--form-main);
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus, textarea:focus {
            border-color: #D6C8A1;
        }

        textarea { height: 120px; resize: none; }

        .captcha-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .captcha-input { width: 100px !important; }
        .captcha-box {
            background-color: #F8F5F0;
            padding: 8px 20px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 20px;
            letter-spacing: 5px;
            color: var(--form-main);
            flex-shrink: 0;
            border: 1px solid #EFEAE4;
        }

        .refresh-btn {
            background: none; border: none; cursor: pointer;
            padding: 5px; display: flex; align-items: center;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background-color: #4f433a;
            color: #ffffff;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="content-wrapper">
        <div class="runner-header">
            <h1 class="title-zh">跑者服務中心</h1>
            <div class="title-en">RUNNER SERVICE CENTER</div>
            <div class="title-slogan">讓我們聽見您の腳步聲</div>
            <p>無論您是因為突破個人最佳成績而興奮，亦或是正處於受傷低潮，有任何想回饋的想法，歡迎隨時聯繫我們唷 ☺</p>
            <p>您的回饋是我們進化的動力，您的提問是我們探索的方向。</p>
            <p>讓我們一起朝更好的自己邁進，希望這裡不只是網站，更是跑者們的補給站。</p>
            <div class="footer-info">✻ 服務時間：週一至週五 09:00 - 18:00 (小編需要運動時間)</div>
        </div>

        <div class="form-container">
            <form>
                <div class="form-group">
                    <label>姓名 / Name</label>
                    <input type="text" placeholder="請輸入您的姓名">
                </div>
                <div class="form-group">
                    <label>電子信箱 / E-mail</label>
                    <input type="email" placeholder="runner@example.com">
                </div>
                <div class="form-group">
                    <label>您的問題 / Your Inquiry</label>
                    <textarea placeholder="每一滴汗水，都值得被聽見..."></textarea>
                </div>
                <div class="form-group">
                    <label>驗證碼 / Verification Code</label>
                    <div class="captcha-container">
                        <input type="text" class="captcha-input" placeholder="輸入碼">
                        <div id="captchaCode" class="captcha-box">7 W 8 Q</div>
                        <button type="button" class="refresh-btn" onclick="refreshCaptcha()">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#B8B0A8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M23 4v6h-6"></path>
                                <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
                            </svg>
                        </button>
                    </div>
                </div>
                <button type="submit" class="submit-btn">送出表單 / Submit</button>
            </form>
        </div>
    </div>

    <script>
        function refreshCaptcha() {
            const chars = '23456789ABCDEFGHJKLMNPQRSTUVWXYZ';
            let newCode = '';
            for (let i = 0; i < 4; i++) {
                newCode += chars.charAt(Math.floor(Math.random() * chars.length)) + (i < 3 ? ' ' : '');
            }
            document.getElementById('captchaCode').innerText = newCode;
        }
    </script>
</body>
</html>
