<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>跑者服務中心</title>
    <style>
        :root {
            --primary-brown: #8B7355;
            --bg-yellow: #FDF9E7;
            --text-gray: #5D5348;
            --input-bg: #FCFAF2;
            --border-color: #E0E0E0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Microsoft JhengHei", sans-serif;
            background-color: #FFFFFF;
            margin: 0;
            display: flex;
            justify-content: center;
            color: var(--text-gray);
        }

        .wrapper {
            width: 100%;
            max-width: 600px;
            background-color: #FFFFFF;
        }

        /* 上半部：米黃色區塊 */
        .header-section {
            background-color: var(--bg-yellow);
            padding: 40px 30px;
            border-left: 10px solid #E6D8AD;
            margin-bottom: 10px;
        }

        h1 {
            color: var(--primary-brown);
            margin: 0;
            font-size: 26px;
            font-weight: bold;
        }

        .subtitle {
            color: #C0B283;
            font-size: 12px;
            letter-spacing: 2px;
            margin-top: 5px;
            margin-bottom: 30px;
        }

        .section-title {
            color: var(--primary-brown);
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 20px;
            display: block;
        }

        .content {
            font-size: 16px;
            line-height: 1.8;
            margin-bottom: 30px;
        }

        .footer-text {
            font-size: 12px;
            color: #A0937D;
            border-top: 1px solid #E6D8AD;
            padding-top: 15px;
            margin-top: 30px;
        }

        /* 下半部：白色表單區塊 */
        .form-section {
            padding: 30px;
            border: 1px solid #F0F0F0;
            border-radius: 20px 20px 0 0;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            font-weight: bold;
            font-size: 18px;
            color: var(--text-gray);
            margin-bottom: 10px;
        }

        input, select, textarea {
            width: 100%;
            padding: 15px;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            box-sizing: border-box;
            background-color: var(--input-bg);
            font-size: 14px;
            color: #888;
        }

        input::placeholder, textarea::placeholder {
            color: #D0D0D0;
        }

        .row {
            display: flex;
            gap: 15px;
        }

        .row .form-group {
            flex: 1;
        }

        textarea {
            height: 120px;
            resize: none;
        }
    </style>
</head>
<body>

<div class="wrapper">
    <!-- 上半部 -->
    <div class="header-section">
        <h1>跑者服務中心</h1>
        <div class="subtitle">RUNNER SERVICE CENTER</div>
        
        <span class="section-title">讓我們聽見您的腳步聲</span>

        <div class="content">
            無論您是因為突破個人最佳成績而興奮，亦或是正處於受傷低潮，有任何想回饋的想法，歡迎隨時聯繫我們唷 ☺<br><br>
            您的回饋是我們進化的動力，您的提問是我們探索的方向，若您在訓練的路上遇到瓶頸，或者發現我們能做得更好的地方，請告訴我們。<br><br>
            讓我們一起朝更好的自己邁進，讓這份對跑步的熱愛，連結起每一個熱血的靈魂。希望這裡不只是網站，更是跑者們的補給站。
        </div>

        <div class="footer-text">
            ☀ 服務時間：週一至週五 09:00 - 18:00 (跑者不休息，但小編需要一些運動時間)
        </div>
    </div>

    <!-- 下半部 -->
    <div class="form-section">
        <form>
            <div class="form-group">
                <label>姓名 / Name</label>
                <input type="text" placeholder="請輸入您的姓名">
            </div>

            <div class="form-group">
                <label>電子信箱 / E-mail</label>
                <input type="email" placeholder="runner@example.com">
            </div>

            <div class="form-group">
                <label>跑者屬性</label>
                <select>
                    <option>新手跑者</option>
                </select>
            </div>

            <div class="row">
                <div class="form-group">
                    <label>跑步最佳成績 (PB)</label>
                    <input type="text" placeholder="例如：全馬3:30:00">
                </div>
                <div class="form-group">
                    <label>目標成績</label>
                    <input type="text" placeholder="例如：全馬2:59:59">
                </div>
            </div>

            <div class="form-group">
                <label>慣用穿戴配備</label>
                <input type="text" placeholder="例如：Garmin, Apple Watch, Coros">
            </div>

            <div class="form-group">
                <label>您的問題</label>
                <textarea placeholder="每一滴汗水，都值得被聽見..."></textarea>
            </div>
        </form>
    </div>
</div>

</body>
</html>
