<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>跑者服務中心 - Runner Service Center</title>
    <style>
        :root {
            --primary-brown: #8B7355;
            --light-bg: #FDF9E7;
            --card-bg: #FFFFFF;
            --text-color: #5D5348;
            --border-color: #E0E0E0;
        }

        body {
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            background-color: #F5F5F5;
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 20px;
            color: var(--text-color);
        }

        .container {
            width: 100%;
            max-width: 600px;
            background-color: var(--light-bg);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        /* 上半部文字區 */
        .header-section {
            padding: 30px;
            border-left: 8px solid #E6D8AD;
        }

        h1 {
            color: var(--primary-brown);
            margin: 0;
            font-size: 24px;
        }

        .subtitle {
            color: #C0B283;
            font-size: 12px;
            letter-spacing: 2px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .description {
            font-size: 15px;
            line-height: 1.8;
            margin-bottom: 20px;
        }

        .footer-note {
            font-size: 12px;
            color: #A0937D;
            border-top: 1px solid #E6D8AD;
            padding-top: 15px;
            margin-top: 20px;
        }

        /* 下半部表單區 */
        .form-section {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 25px 25px 0 0;
            margin-top: -10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            color: var(--primary-brown);
            font-size: 16px;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-sizing: border-box;
            background-color: #FAFAFA;
            font-size: 14px;
            color: #333;
        }

        input::placeholder, textarea::placeholder {
            color: #BCBCBC;
        }

        .row {
            display: flex;
            gap: 15px;
        }

        .row .form-group {
            flex: 1;
        }

        textarea {
            height: 120px;
            resize: vertical;
        }

        /* 簡單的按鈕樣式 (原圖未顯示，預留) */
        .submit-btn {
            background-color: var(--primary-brown);
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- 文字介紹區域 -->
    <div class="header-section">
        <h1>跑者服務中心</h1>
        <div class="subtitle">RUNNER SERVICE CENTER</div>
        
        <div class="description">
            <strong>讓我們聽見您的腳步聲</strong><br><br>
            無論您是因為突破個人最佳成績而興奮，亦或是正處於受傷低潮，有任何想回饋的想法，歡迎隨時聯繫我們唷 ☺<br><br>
            您的回饋是我們進化的動力，您的提問是我們探索的方向，若您在訓練的路上遇到瓶頸，或者發現我們能做得更好的地方，請告訴我們。<br><br>
            讓我們一起朝更好的自己邁進，讓這份對跑步的熱愛，連結起每一個熱血的靈魂。希望這裡不只是網站，更是跑者們的補給站。
        </div>

        <div class="footer-note">
            ☀ 服務時間：週一至週五 09:00 - 18:00 (跑者不休息，但小編需要一些運動時間)
        </div>
    </div>

    <!-- 表單區域 -->
    <div class="form-section">
        <form>
            <div class="form-group">
                <label>姓名 / Name</label>
                <input type="text" placeholder="請輸入您的姓名">
            </div>

            <div class="form-group">
                <label>電子信箱 / E-mail</label>
                <input type="email" placeholder="runner@example.com">
            </div>

            <div class="form-group">
                <label>跑者屬性</label>
                <select>
                    <option value="">新手跑者</option>
                    <option value="">進階跑者</option>
                    <option value="">馬拉松選手</option>
                </select>
            </div>

            <div class="row">
                <div class="form-group">
                    <label>跑步最佳成績 (PB)</label>
                    <input type="text" placeholder="例如：全馬3:30:00">
                </div>
                <div class="form-group">
                    <label>目標成績</label>
                    <input type="text" placeholder="例如：全馬2:59:59">
                </div>
            </div>

            <div class="form-group">
                <label>慣用穿戴配備</label>
                <input type="text" placeholder="例如：Garmin, Apple Watch, Coros">
            </div>

            <div class="form-group">
                <label>您的問題</label>
                <textarea placeholder="每一滴汗水，都值得被聽見..."></textarea>
            </div>

            <button type="submit" class="submit-btn">送出訊息</button>
        </form>
    </div>
</div>

</body>
</html>
