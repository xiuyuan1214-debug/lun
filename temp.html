<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Runner Form</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #4a3c31;
            max-width: 600px;
            margin: 20px auto;
            padding: 20px;
        }
        .form-group {
            margin-bottom: 25px;
        }
        /* 統一標題大小 */
        label {
            display: block;
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 8px;
        }
        /* 移除框線，僅保留文字樣式 */
        .input-text {
            width: 100%;
            border: none;
            background: none;
            font-size: 1rem;
            color: #8e8e8e;
            padding: 5px 0;
            outline: none;
        }
        .row {
            display: flex;
            gap: 20px;
        }
        .row .form-group {
            flex: 1;
        }
        .captcha-area {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .captcha-code {
            background-color: #f2ede4;
            padding: 10px 20px;
            border-radius: 8px;
            letter-spacing: 5px;
            font-style: italic;
        }
    </style>
</head>
<body>

    <!-- 參考文件：IMG_5389.jpeg -->

    <div class="form-group">
        <label>姓名 / Name</label>
        <div class="input-text">請輸入您的姓名</div>
    </div>

    <div class="form-group">
        <label>電子信箱 / E-mail</label>
        <div class="input-text">runner@example.com</div>
    </div>

    <div class="form-group">
        <label>跑者屬性</label>
        <div class="input-text">新手跑者</div>
    </div>

    <div class="row">
        <div class="form-group">
            <label>跑步最佳成績 (PB)</label>
            <div class="input-text">例如：全馬3:30:00</div>
        </div>
        <div class="form-group">
            <label>目標成績</label>
            <div class="input-text">例如：全馬2:59:59</div>
        </div>
    </div>

    <div class="form-group">
        <label>慣用穿戴配備</label>
        <div class="input-text">例如：Garmin, Apple Watch, Coros</div>
    </div>

    <div class="form-group">
        <label>您的問題</label>
        <div class="input-text">每一滴汗水，都值得被聽見...</div>
    </div>

    <div class="form-group">
        <label>驗證碼：</label>
        <div class="captcha-area">
            <div class="input-text" style="width: auto;">輸入碼</div>
            <div class="captcha-code">A 5 2 G</div>
        </div>
    </div>

</body>
</html>
