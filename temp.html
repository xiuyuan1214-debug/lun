<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            /* 奶油黃加深配色 */
            --cream-bg: #FDECA6;      
            --cream-shadow: #F9D876;  
            
            /* 三行文字配色 */
            --color-zh: #5D4037;       
            --color-en: #8D6E63;       
            --color-slogan: #E67E22;   
            
            --form-label: #7A6652;    
            --form-main: #3D352F;
            --input-border: #F2F2F2; 
            --input-bg: #FDFDF8;     
        }

        body {
            font-family: -apple-system, "PingFang TC", "Microsoft JhengHei", sans-serif;
            margin: 0;
            background-color: #ffffff;
        }

        /* 奶油黃區塊：四角大圓角且間距縮小 */
        .runner-header {
            background-color: var(--cream-bg);
            border-radius: 150px; 
            /* 縮小底部內距 */
            padding: 50px 40px 55px 40px;
            position: relative;
            text-align: center;
            border: none;
            box-shadow: 0 15px 0 var(--cream-shadow), 0 30px 40px rgba(0,0,0,0.08);
            margin: 20px 15px 0 15px;
        }

        .title-zh {
            color: var(--color-zh);
            font-size: 28px;
            margin: 0;
            font-weight: 900;
            letter-spacing: 2px;
        }

        .title-en {
            color: var(--color-en);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 4px;
            margin-top: 10px;
            margin-bottom: 25px;
        }

        .title-slogan {
            color: var(--color-slogan);
            font-size: 19px;
            font-weight: 800;
            margin-bottom: 20px;
            background: rgba(255,255,255,0.4);
            display: inline-block;
            padding: 5px 20px;
            border-radius: 20px;
        }

        .runner-header p {
            font-size: 14px;
            line-height: 1.8;
            color: var(--color-zh);
            /* 段落間距微調緊湊 */
            margin: 8px 0;
            font-weight: 500;
            text-align: left;
        }

        /* 紅色勾勾標記處：縮小上方間距 */
        .footer-info {
            font-size: 10px;
            color: #968370;
            /* 距離上方段落明顯縮小 */
            margin-top: 12px;
            border-top: 1px solid rgba(0,0,0,0.05);
            padding-top: 10px;
            text-align: center;
        }

        /* 表單區域 */
        .form-container {
            background-color: #ffffff;
            margin-top: -45px;
            padding: 60px 30px 40px 30px;
            border-top-left-radius: 50px;
            border-top-right-radius: 50px;
            position: relative;
            z-index: 10;
        }

        .form-group { margin-bottom: 25px; }

        label {
            display: block;
            font-size: 18px;
            font-weight: bold;
            color: var(--form-label);
            margin-bottom: 12px;
        }

        input, select, textarea {
            width: 100%;
            padding: 14px 20px;
            border: 1px solid var(--input-border);
            border-radius: 14px;
            font-size: 14px;
            background-color: var(--input-bg);
            color: var(--form-main);
            box-sizing: border-box;
            outline: none;
        }

        textarea { height: 130px; resize: none; }

        .captcha-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .captcha-input { width: 110px !important; }
        .captcha-box {
            background-color: #F8F5F0;
            padding: 10px 25px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 22px;
            letter-spacing: 5px;
            color: var(--form-main);
            flex-shrink: 0;
            border: 1px solid #EFEAE4;
        }

        .refresh-btn {
            background: none; border: none; cursor: pointer;
            padding: 5px; display: flex; align-items: center;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background-color: #4f433a;
            color: #ffffff;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="runner-header">
        <h1 class="title-zh">跑者服務中心</h1>
        <div class="title-en">RUNNER SERVICE CENTER</div>
        <div class="title-slogan">讓我們聽見您の腳步聲</div>
        <p>無論您是因為突破個人最佳成績而興奮，亦或是正處於受傷低潮，有任何想回饋的想法，歡迎隨時聯繫我們唷。</p>
        <p>您的回饋是我們進化的動力，您的提問是我們探索的方向，若您在訓練的路上遇到瓶頸，或者發現我們能做得更好的地方，請告訴我們。</p>
        <p>讓我們一起朝更好的方向邁進，讓這份對跑步熱愛，連結起每一個熱血的靈魂。
            希望這裡不只是網站，更是跑者們的補給站ᴗ̈</p>
        <div class="footer-info">☀️服務時間：週一至週五 09:00 - 18:00 (跑者不休息，但小編需要一些運動時間)</div>
    </div>

    <div class="form-container">
        <form>
            <div class="form-group">
                <label>姓名 / Name</label>
                <input type="text" placeholder="請輸入您的姓名">
            </div>
            <div class="form-group">
                <label>電子信箱 / E-mail</label>
                <input type="email" placeholder="runner@gmail.com">
            </div>
            <div class="form-group">
                <label>跑者屬性 / Runner Type</label>
                <select>
                    <option value="" disabled selected>請選擇 / Please Select</option>
                    <option value="beginner">新手跑者 / Beginner Runner</option>
                    <option value="half-marathon">半馬跑者 / Half Marathoner</option>
                    <option value="marathon">全馬跑者 / Marathoner</option>
                    <option value="ultra-trail">超馬/越野跑者 / Ultra & Trail Runner</option>
                </select>
            </div>
            <div class="form-group">
                <label>最佳成績 / Personal Best</label>
                <input type="text" placeholder="例如：全馬3:30:00">
            </div>
            <div class="form-group">
                <label>目標成績 / Target Goal</label>
                <input type="text" placeholder="例如：全馬2:59:59">
            </div>
            <div class="form-group">
                <label>穿戴配備 / Wearable Device</label>
                <input type="text" placeholder="例如：Garmin, Apple Watch, Coros">
            </div>
            <div class="form-group">
                <label>您的問題 / Your Inquiry</label>
                <textarea placeholder="每一滴汗水，都值得被聽見..."></textarea>
            </div>
            <div class="form-group">
                <label>驗證碼 / Verification Code</label>
                <div class="captcha-container">
                    <input type="text" class="captcha-input" placeholder="輸入碼">
                    <div id="captchaCode" class="captcha-box">7 W 8 Q</div>
                    <button type="button" class="refresh-btn" onclick="refreshCaptcha()">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#B8B0A8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M23 4v6h-6"></path>
                            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
                        </svg>
                    </button>
                </div>
            </div>
            <button type="submit" class="submit-btn">送出表單 / Submit</button>
        </form>
    </div>

    <script>
        function refreshCaptcha() {
            const chars = '23456789ABCDEFGHJKLMNPQRSTUVWXYZ';
            let newCode = '';
            for (let i = 0; i < 4; i++) {
                newCode += chars.charAt(Math.floor(Math.random() * chars.length)) + (i < 3 ? ' ' : '');
            }
            document.getElementById('captchaCode').innerText = newCode;
        }
    </script>
</body>
</html>
