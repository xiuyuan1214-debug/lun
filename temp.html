<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: -apple-system, "PingFang TC", "Microsoft JhengHei", sans-serif;
            margin: 0;
            padding: 0;
            background-color: #ffffff;
        }

        .form-container {
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }

        .form-group {
            margin-bottom: 25px;
        }

        /* 嚴格對齊 IMG_5426_8.jpg 的 Label 樣式 */
        label {
            display: block;
            font-size: 18px;
            font-weight: bold;
            color: #444444; /* 圖片中的深灰色 */
            margin-bottom: 10px;
        }

        /* 輸入框樣式完全對齊照片 */
        input, select, textarea {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #E0E0E0; /* 極細灰色邊框 */
            border-radius: 8px;
            font-size: 16px;
            color: #333;
            background-color: #ffffff;
            box-sizing: border-box;
            outline: none;
        }

        /* Placeholder 顏色對齊 */
        input::placeholder, textarea::placeholder {
            color: #CCCCCC;
        }

        /* 下拉選單文字顏色 */
        select {
            color: #007AFF; /* 圖片中「請選擇」的藍色 */
        }

        textarea {
            height: 120px;
            resize: none;
        }

        /* 驗證碼區塊還原 */
        .captcha-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .captcha-input {
            width: 100px !important;
        }

        .captcha-box {
            background-color: #F0EFEA;
            padding: 10px 25px;
            border-radius: 5px;
            font-weight: bold;
            font-size: 20px;
            letter-spacing: 5px;
            color: #444;
        }

        .refresh-icon {
            color: #999;
            font-size: 20px;
            text-decoration: none;
        }

        .submit-bar {
            background-color: #5D4E44;
            height: 15px;
            width: 100%;
            margin-top: 30px;
            border-radius: 2px;
        }
    </style>
</head>
<body>

<div class="form-container">
    <form>
        <div class="form-group">
            <label>姓名 / Name</label>
            <input type="text" placeholder="請輸入您的姓名">
        </div>

        <div class="form-group">
            <label>電子信箱 / E-mail</label>
            <input type="email" placeholder="runner@gmail.com">
        </div>

        <div class="form-group">
            <label>跑者屬性 / Runner Type</label>
            <select>
                <option>請選擇 / Please Select</option>
            </select>
        </div>

        <div class="form-group">
            <label>最佳成績 / Personal Best</label>
            <input type="text" placeholder="例如：全馬3:30:00">
        </div>

        <div class="form-group">
            <label>目標成績 / Target Goal</label>
            <input type="text" placeholder="例如：全馬2:59:59">
        </div>

        <div class="form-group">
            <label>穿戴配備 / Wearable Device</label>
            <input type="text" placeholder="例如：Garmin, Apple Watch, Coros">
        </div>

        <div class="form-group">
            <label>您的問題 / Your Inquiry</label>
            <textarea placeholder="每一滴汗水，都值得被聽見..."></textarea>
        </div>

        <div class="form-group">
            <label>驗證碼 / Verification Code</label>
            <div class="captcha-container">
                <input type="text" class="captcha-input" placeholder="輸入碼">
                <div class="captcha-box">CM5F</div>
                <a href="#" class="refresh-icon">↻</a>
            </div>
        </div>

        <!-- 底部裝飾條 -->
        <div class="submit-bar"></div>
    </form>
</div>

</body>
</html>
