<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, "Noto Sans TC", "Microsoft JhengHei", sans-serif;
            background-color: #ffffff;
            color: #4a3c31;
        }

        /* 頂部黃色區域：100% 寬度 */
        .header-section {
            background-color: #fff9e6;
            padding: 40px 20px;
            width: 100%;
            box-sizing: border-box;
        }

        .content-limit {
            max-width: 600px;
            margin: 0 auto;
        }

        .title-main { font-size: 22px; margin: 0; font-weight: bold; }
        .title-en { font-size: 11px; color: #b5a48d; letter-spacing: 2px; margin-bottom: 25px; }
        .slogan { font-size: 15px; font-weight: bold; color: #b5a48d; margin-bottom: 15px; }
        .intro-p { font-size: 14px; line-height: 1.8; margin-bottom: 15px; }
        .service-hours { font-size: 11px; color: #b5a48d; margin-top: 25px; }

        /* 表單區域：無外圍框線 */
        .form-section {
            padding: 35px 20px;
            width: 100%;
            box-sizing: border-box;
        }

        /* 嚴格執行：標題文字大小統一 */
        .field-label {
            font-size: 17px; 
            font-weight: bold;
            display: block;
            margin-bottom: 10px;
            color: #4a3c31;
        }

        /* 欄位框線設定 */
        .input-box {
            width: 100%;
            box-sizing: border-box;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            padding: 12px 15px;
            font-size: 15px;
            margin-bottom: 25px;
            outline: none;
            display: block;
            background: #fff;
            color: #4a3c31;
        }

        /* 驗證碼區塊 */
        .captcha-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .captcha-input {
            width: 100px;
            margin-bottom: 0;
        }
        .captcha-code-box {
            background-color: #f2ede4;
            padding: 10px 18px;
            border-radius: 6px;
            font-style: italic;
            font-weight: bold;
            letter-spacing: 4px;
        }
        .refresh-icon {
            font-size: 20px;
            color: #b5a48d;
            cursor: pointer;
            user-select: none;
        }

        ::placeholder { color: #cccccc; }
    </style>
</head>
<body>

    <div class="header-section">
        <div class="content-limit">
            <div class="title-main">跑者服務中心</div>
            <div class="title-en">RUNNER SERVICE CENTER</div>
            <div class="slogan">讓我們聽見您的腳步聲</div>
            <p class="intro-p">無論您是因為突破個人最佳成績而興奮，亦或是正處於受傷低潮，有任何想回饋的想法，歡迎隨時聯繫我們唷 ◡̈</p>
            <p class="intro-p">您的回饋是我們進化的動力，您的提問是我們探索的方向，若您在訓練的路上遇到瓶頸，或者發現我們能做得更好的地方，請告訴我們。</p>
            <p class="intro-p">讓我們一起朝更好的自己邁進，讓這份對跑步的熱愛，連結起每一個熱血的靈魂。希望這裡不只是網站，更是跑者們的補給站。</p>
            <div class="service-hours">☀️ 服務時間：週一至週五 09:00 - 18:00</div>
        </div>
    </div>

    <div class="form-section">
        <div class="content-limit">
            <label class="field-label">姓名 / Name</label>
            <input type="text" class="input-box" placeholder="請輸入您的姓名">

            <label class="field-label">電子信箱 / E-mail</label>
            <input type="email" class="input-box" placeholder="runner@example.com">

            <label class="field-label">跑者屬性</label>
            <select class="input-box">
                <option>新手跑者</option>
                <option>半馬跑者</option>
                <option>全馬跑者</option>
                <option>超馬/越野跑者</option>
            </select>

            <label class="field-label">跑步最佳成績 (PB)</label>
            <input type="text" class="input-box" placeholder="例如：全馬3:30:00">

            <label class="field-label">慣用穿戴配備</label>
            <input type="text" class="input-box" placeholder="例如：Garmin, Apple Watch, Coros">

            <label class="field-label">您的問題</label>
            <textarea class="input-box" rows="5" style="height: auto;" placeholder="每一滴汗水，都值得被聽見..."></textarea>

            <label class="field-label">驗證碼：</label>
            <div class="captcha-row">
                <input type="text" class="input-box captcha-input" placeholder="輸入碼">
                <div class="captcha-code-box">A 5 2 G</div>
                <div class="refresh-icon" title="重新整理">↻</div>
            </div>
        </div>
    </div>

</body>
</html>
