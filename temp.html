<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>跑者服務中心</title>
    <style>
        :root {
            --primary-brown: #8B7355; /* 標題咖啡色 */
            --light-bg: #FDF9E7;    /* 上方背景米色 */
            --btn-bg: #4f433a;      /* 按鈕深咖啡 */
            --track-yellow: #e6d8ad; /* 跑道裝飾色 */
            /* 根據 IMG_5426_6.jpg 精確校對 */
            --input-border: #E8E4D6; 
            --input-bg: #FCFBF7; 
            --placeholder-color: #C7C7C7;
            --label-color: #7A6652;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Microsoft JhengHei", sans-serif;
            background-color: #fff;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }

        .main-container {
            width: 100%;
            max-width: 100%;
            background-color: #fff;
            min-height: 100vh;
        }

        /* 上半部介紹區 */
        .runner-header {
            background-color: var(--light-bg);
            padding: 40px 10% 60px 10%;
            position: relative;
            color: #5d5348;
            border-bottom-left-radius: 40px; 
        }

        .runner-header::before {
            content: "";
            position: absolute;
            left: 0;
            top: 0;
            bottom: 40px;
            width: 10px;
            background: linear-gradient(to bottom, var(--track-yellow) 0%, var(--track-yellow) 50%, var(--primary-brown) 50%, var(--primary-brown) 100%);
            background-size: 100% 30px;
            border-right: 3px solid var(--track-yellow);
        }

        .runner-header h1 { color: var(--primary-brown); margin: 0; font-size: 24px; text-align: left; }
        .runner-header .en-title { color: #c0b283; font-size: 12px; letter-spacing: 1px; margin: 5px 0 25px 0; text-align: left; }
        .runner-header .highlight { color: var(--primary-brown); font-weight: bold; font-size: 16px; margin-bottom: 15px; }
        .runner-header p { font-size: 14px; line-height: 1.8; margin: 15px 0; color: #666; }
        .runner-header .footer-info { font-size: 11px; color: #a0937d; margin-top: 30px; border-top: 1px solid #eee; padding-top: 15px; }

        /* 下半部表單區 */
        .form-container {
            padding: 40px 8%;
            background-color: #ffffff;
            position: relative;
            margin-top: -30px;
            border-top-left-radius: 40px;
            border-top-right-radius: 40px;
        }

        form { width: 100%; max-width: 800px; margin: 0 auto; }
        .form-group { margin-bottom: 20px; }
        
        /* 兩欄佈局容器 */
        .form-row {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        .form-row .form-group { flex: 1; margin-bottom: 0; }

        label { 
            display: block; 
            font-weight: bold; 
            font-size: 18px; 
            color: var(--label-color); 
            margin-bottom: 10px; 
        }

        /* 嚴格匹配圖片的輸入框格式 */
        input, select, textarea {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid var(--input-border);
            border-radius: 15px; /* 更圓潤的圓角 */
            background-color: var(--input-bg);
            font-size: 14px;
            box-sizing: border-box;
            outline: none;
            color: #555;
        }

        input::placeholder, textarea::placeholder { 
            color: var(--placeholder-color);
        }

        textarea { height: 100px; resize: none; }

        /* 驗證碼區 */
        .captcha-area { display: flex; align-items: center; gap: 10px; margin-top: 5px; }
        .captcha-input { width: 120px !important; }
        .captcha-code-box {
            background-color: #f3efe9;
            padding: 8px 20px;
            border-radius: 12px;
            font-weight: bold;
            color: var(--primary-brown);
            cursor: pointer;
            letter-spacing: 2px;
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background-color: var(--btn-bg);
            color: #ffffff;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }

        @media (max-width: 600px) {
            .form-row { flex-direction: column; gap: 20px; }
        }
    </style>
</head>
<body>

<div class="main-container">
    <div class="runner-header">
        <h1>跑者服務中心</h1>
        <div class="en-title">RUNNER SERVICE CENTER</div>
        <div class="highlight">讓我們聽見您的腳步聲</div>
        <p>無論您是因為突破個人最佳成績而興奮，亦或是正處於受傷低潮，有任何想回饋的想法，歡迎隨時聯繫我們唷 ☺</p>
        <p>您的回饋是我們進化的動力，您的提問是我們探索的方向，若您在訓練的路上遇到瓶頸，或者發現我們能做得更好的地方，請告訴我們。</p>
        <p>讓我們一起朝更好的自己邁進，讓這份對跑步熱愛，連結起每一個熱血的靈魂。希望這裡不只是網站，更是跑者們的補給站。</p>
        <div class="footer-info">☀ 服務時間：週一至週五 09:00 - 18:00 (跑者不休息，但小編需要一些運動時間)</div>
    </div>

    <div class="form-container">
        <form>
            <div class="form-group">
                <label>姓名 / Name</label>
                <input type="text" placeholder="請輸入您的姓名">
            </div>

            <div class="form-group">
                <label>電子信箱 / E-mail</label>
                <input type="email" placeholder="runner@example.com">
            </div>

            <div class="form-group">
                <label>跑者屬性</label>
                <select>
                    <option disabled selected>新手跑者</option>
                    <option>新手跑者 / Beginner Runner</option>
                    <option>半馬跑者 / Half Marathoner</option>
                    <option>全馬跑者 / Marathoner</option>
                    <option>超馬跑者 / Ultra Runner</option>
                </select>
            </div>

            <!-- 並排兩欄：跑步最佳成績與目標成績 -->
            <div class="form-row">
                <div class="form-group">
                    <label>跑步最佳成績 (PB)</label>
                    <input type="text" placeholder="例如：全馬3:30:00">
                </div>
                <div class="form-group">
                    <label>目標成績</label>
                    <input type="text" placeholder="例如：全馬2:59:59">
                </div>
            </div>

            <div class="form-group">
                <label>慣用穿戴配備</label>
                <input type="text" placeholder="例如：Garmin, Apple Watch, Coros">
            </div>

            <div class="form-group">
                <label>您的問題</label>
                <textarea placeholder="每一滴汗水，都值得被聽見..."></textarea>
            </div>

            <div class="form-group">
                <label>驗證碼：(防止機器人垃圾郵件)</label>
                <div class="captcha-area">
                    <input type="text" class="captcha-input" placeholder="輸入驗證碼">
                    <div id="captchaCode" class="captcha-code-box" onclick="generateCaptcha()">8K2P</div>
                </div>
            </div>

            <button type="submit" class="submit-btn">送出表單 / Submit</button>
        </form>
    </div>
</div>

<script>
    function generateCaptcha() {
        const chars = '23456789ABCDEFGHJKLMNPQRSTUVWXYZ';
        let result = '';
        for (let i = 0; i < 4; i++) {
            result += chars.charAt(Math.floor(Math.random() * chars.length));
        }
        document.getElementById('captchaCode').innerText = result;
    }
</script>

</body>
</html>
