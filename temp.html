<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, "Noto Sans TC", "Microsoft JhengHei", sans-serif;
            background-color: #ffffff;
            color: #4a3c31;
        }

        /* 頂部區域 */
        .header-section {
            background-color: #fff9e6;
            padding: 40px 20px;
            width: 100%;
            box-sizing: border-box;
        }

        .content-limit {
            max-width: 600px;
            margin: 0 auto;
        }

        /* 標題置中 */
        .title-group {
            text-align: center;
            margin-bottom: 30px;
        }
        .title-main { font-size: 22px; margin: 0; font-weight: bold; }
        .title-en { font-size: 11px; color: #b5a48d; letter-spacing: 2px; margin-top: 5px; }

        /* Slogan 顏色配合整體配色：深咖啡色 */
        .slogan { 
            font-size: 15px; 
            font-weight: bold; 
            color: #4a3c31; 
            margin-bottom: 15px; 
        }

        .intro-p { font-size: 14px; line-height: 1.8; margin-bottom: 15px; }

        /* 太陽符號緊貼文字 */
        .service-hours { 
            font-size: 11px; 
            color: #b5a48d; 
            margin-top: 25px;
            display: block;
        }

        /* 表單區域 */
        .form-section {
            padding: 35px 20px;
            width: 100%;
            box-sizing: border-box;
        }

        /* 欄位標題 11px */
        .field-label {
            font-size: 11px; 
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
            color: #4a3c31;
            letter-spacing: 0.8px;
        }

        .input-box {
            width: 100%;
            box-sizing: border-box;
            border: 1px solid #eeeeee;
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 13px;
            margin-bottom: 18px;
            outline: none;
            display: block;
            background: #fff;
            color: #4a3c31;
        }

        .captcha-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 30px;
        }
        .captcha-input {
            width: 80px;
            margin-bottom: 0;
        }
        .captcha-code-box {
            background-color: #f2ede4;
            padding: 8px 15px;
            border-radius: 6px;
            font-style: italic;
            font-weight: bold;
            letter-spacing: 4px;
            font-size: 13px;
        }
        .refresh-icon {
            font-size: 18px;
            color: #b5a48d;
            cursor: pointer;
        }

        .submit-btn {
            width: 100%;
            background-color: #4a3c31;
            color: white;
            border: none;
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
        }

        ::placeholder { color: #d1d1d1; }
    </style>
</head>
<body>

    <div class="header-section">
        <div class="content-limit">
            <div class="title-group">
                <div class="title-main">跑者服務中心</div>
                <div class="title-en">RUNNER SERVICE CENTER</div>
            </div>
            
            <div class="slogan">讓我們聽見您の腳步聲</div>
            <p class="intro-p">無論您是因為突破個人最佳成績而興奮，亦或是正處於受傷低潮，有任何想回饋的想法，歡迎隨時聯繫我們唷 ◡̈</p>
            <p class="intro-p">您的回饋是我們進化的動力，您的提問是我們探索的方向，若您在訓練的路上遇到瓶頸，或者發現我們能做得更好的地方，請告訴我們。</p>
            <p class="intro-p">讓我們一起朝更好的自己邁進，讓這份對跑步的熱愛，連結起每一個熱血的靈魂。希望這裡不只是網站，更是跑者們的補給站。</p>
            <div class="service-hours">☀️服務時間：週一至週五 09:00 - 18:00 (跑者不休息，但小編需要一些運動時間)</div>
        </div>
    </div>

    <div class="form-section">
        <div class="content-limit">
            <label class="field-label">姓名 / Name</label>
            <input type="text" class="input-box" placeholder="請輸入您的姓名">

            <label class="field-label">電子信箱 / E-mail</label>
            <input type="email" class="input-box" placeholder="runner@example.com">

            <label class="field-label">跑者屬性</label>
            <select class="input-box">
                <option>新手跑者</option>
                <option>半馬跑者</option>
                <option>全馬跑者</option>
                <option>超馬/越野跑者</option>
            </select>

            <label class="field-label">跑步最佳成績</label>
            <input type="text" class="input-box" placeholder="例如：全馬3:30:00">

            <label class="field-label">目標成績</label>
            <input type="text" class="input-box" placeholder="例如：全馬2:59:59">

            <label class="field-label">慣用穿戴配備</label>
            <input type="text" class="input-box" placeholder="例如：Garmin, Apple Watch, Coros">

            <label class="field-label">您的問題</label>
            <textarea class="input-box" rows="5" style="height: auto;" placeholder="每一滴汗水，都值得被聽見..."></textarea>

            <label class="field-label">驗證碼</label>
            <div class="captcha-row">
                <input type="text" class="input-box captcha-input" placeholder="輸入碼">
                <div class="captcha-code-box">A 5 2 G</div>
                <div class="refresh-icon">↻</div>
            </div>

            <button type="submit" class="submit-btn">送出表單</button>
        </div>
    </div>

</body>
</html>
