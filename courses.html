<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>課程簡介 - 跑班訓練營</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
  <script src="nav_bar.js"></script>
  <div id="navBar"></div>

<section style="max-width: 900px; margin: 40px auto; font-family: 'PingFang TC', sans-serif; text-align: center;">
    
    <h2 style="color: #7A6348; letter-spacing: 2px; margin-bottom: 30px;">核心價值</h2>

    <div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; padding: 20px;">
        
        <!-- 線上課表核心 -->
        <div style="width: 240px; height: 270px; background: #FFF9E6; clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%); display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 25px;">
            <div style="font-weight: bold; color: #7A6348; margin-bottom: 10px;">數據驅動訓練</div>
            <p style="font-size: 0.85em; color: #8B7E6D; line-height: 1.6;">打破地理限制<br>科學調控每一公里<br>的訓練價值</p>
        </div>

        <!-- 私人教學核心 -->
        <div style="width: 240px; height: 270px; background: #FAF4E6; clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%); display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 25px;">
            <div style="font-weight: bold; color: #8B7355; margin-bottom: 10px;">優化動力鏈</div>
            <p style="font-size: 0.85em; color: #8B7E6D; line-height: 1.6;">根據身體結構優化<br>靠精準數據實踐<br>讓進步不再靠運氣</p>
        </div>

        <!-- 企業包班核心 -->
        <div style="width: 240px; height: 270px; background: #F5F2E9; clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%); display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 25px;">
            <div style="font-weight: bold; color: #7A6348; margin-bottom: 10px;">融入企業文化</div>
            <p style="font-size: 0.85em; color: #8B7E6D; line-height: 1.6;">職場健康與活力<br>團體共榮<br>注入運動精神</p>
        </div>

    </div>
</section>

</body>
</html>
