<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>課程簡介 - 跑班訓練營</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
  <script src="nav_bar.js"></script>
  <div id="navBar"></div>

<section style="max-width: 950px; margin: 40px auto; font-family: 'PingFang TC', sans-serif; text-align: center;">
    
    <div style="margin-bottom: 40px;">
        <h2 style="color: #7A6348; letter-spacing: 2px;">古佳倫｜煦光跑訓 核心理念</h2>
    </div>

    <!-- 蜂巢佈局容器 -->
    <div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; padding: 20px;">
        
        <!-- 線上課表核心 -->
        <div style="width: 260px; height: 300px; background: #FFF9E6; clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%); display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 25px; border: 1px solid #F3E5AB;">
            <div style="font-weight: bold; color: #7A6348; margin-bottom: 12px;">線上課表核心</div>
            <p style="font-size: 0.85em; color: #8B7E6D; line-height: 1.7;">數據驅動的週期化訓練<br>打破地理限制<br>科學調控每一公里的價值</p>
        </div>

        <!-- 品牌精神 (中心) -->
        <div style="width: 260px; height: 300px; background: #7A6348; clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%); display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 25px; color: white;">
            <div style="font-size: 1.2em; font-weight: bold; letter-spacing: 1px;">古佳倫</div>
            <div style="font-size: 0.75em; opacity: 0.8; margin-bottom: 15px;">暖陽陪伴者</div>
            <p style="font-size: 0.9em; line-height: 1.6;">讓我們一起跑出<br>健康快樂的每一步</p>
        </div>

        <!-- 私人教學核心 -->
        <div style="width: 260px; height: 300px; background: #FAF4E6; clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%); display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 25px;">
            <div style="font-weight: bold; color: #8B7355; margin-bottom: 12px;">私人教學核心</div>
            <p style="font-size: 0.85em; color: #8B7E6D; line-height: 1.7;">根據身體結構優化動力鏈<br>進步不再靠運氣<br>靠精準科學數據實踐</p>
        </div>

    </div>
</section>

</body>
</html>
