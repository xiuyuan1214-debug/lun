<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>課程簡介 - 跑班訓練營</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
  <script src="nav_bar.js"></script>
  <div id="navBar"></div>

<section style="max-width: 900px; margin: 40px auto; padding: 50px; background: #FFFEFB; border-radius: 40px; border: 1px solid #F5F2E9;">
    
    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 40px; text-align: center;">
        
        <!-- 線上課表細項 -->
        <div>
            <div style="color: #B5A48B; font-size: 1.1em; margin-bottom: 20px; font-weight: bold;">☀ 線上課表計畫</div>
            <div style="width: 210px; height: 210px; border: 1px solid #E6D5A7; border-radius: 50%; margin: 0 auto; display: flex; flex-direction: column; justify-content: center; align-items: center; background: white; padding: 20px;">
                <ul style="list-style: none; padding: 0; margin: 0; font-size: 0.85em; color: #8B7E6D; line-height: 1.8;">
                    <li>週期化備賽規劃</li>
                    <li>數據即時反饋</li>
                    <li>動態調整下週課表</li>
                    <li>線上諮詢機制</li>
                </ul>
            </div>
        </div>

        <!-- 私人教學細項 -->
        <div>
            <div style="color: #B5A48B; font-size: 1.1em; margin-bottom: 20px; font-weight: bold;">👣 私人一對一指導</div>
            <div style="width: 210px; height: 210px; border: 1px solid #E6D5A7; border-radius: 50%; margin: 0 auto; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #FFFBF0; padding: 20px;">
                <ul style="list-style: none; padding: 0; margin: 0; font-size: 0.85em; color: #7A6348; line-height: 1.8; font-weight: bold;">
                    <li>跑姿影像校正</li>
                    <li>體感配速建立</li>
                    <li>動態負荷調控</li>
                    <li>跑者專項強化</li>
                </ul>
            </div>
        </div>

        <!-- 企業包班細項 -->
        <div>
            <div style="color: #B5A48B; font-size: 1.1em; margin-bottom: 20px; font-weight: bold;">🤝 企業文化包班</div>
            <div style="width: 210px; height: 210px; border: 1px solid #E6D5A7; border-radius: 50%; margin: 0 auto; display: flex; flex-direction: column; justify-content: center; align-items: center; background: white; padding: 20px;">
                <ul style="list-style: none; padding: 0; margin: 0; font-size: 0.85em; color: #8B7E6D; line-height: 1.8;">
                    <li>提升團隊凝聚力</li>
                    <li>企業賽事推動</li>
                    <li>職場壓力紓解</li>
                    <li>職場健康活力</li>
                </ul>
            </div>
        </div>

    </div>

    <!-- 底部行動區 -->
    <div style="margin-top: 60px; text-align: center;">
        <p style="color: #B5A48B; margin-bottom: 25px; font-size: 0.95em;">讓我們一起跑出健康快樂的每一步 ᴗ̈</p>
        <button style="background: #7A6348; color: white; border: none; padding: 18px 60px; border-radius: 50px; font-weight: bold; cursor: pointer; font-size: 1.1em; box-shadow: 0 4px 15px rgba(122, 99, 72, 0.2);">
            預約一份溫暖的諮詢
        </button>
    </div>
</section>

</body>
</html>
