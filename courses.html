<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>課程簡介 - 跑班訓練營</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
  <script src="nav_bar.js"></script>
  <div id="navBar"></div>

<section style="max-width: 900px; margin: 40px auto; font-family: 'PingFang TC', sans-serif; text-align: center;">
    
    <div style="margin-bottom: 40px;">
        <h2 style="color: #7A6348; margin-bottom: 10px;">為什麼選擇煦光跑訓？</h2>
        <p style="color: #B5A48B; font-size: 0.9em;">因為我們相信，跑步是善良與自我的對話。</p>
    </div>

    <!-- 蜂巢佈局容器 -->
    <div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding: 20px;">
        
        <!-- 六角形 1 -->
        <div style="width: 250px; height: 280px; background: #FFF9E6; clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%); display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; border: 1px solid #F3E5AB;">
            <div style="font-size: 1.5em; color: #7A6348; margin-bottom: 10px;">☀</div>
            <div style="font-weight: bold; color: #7A6348; margin-bottom: 8px;">暖陽陪伴</div>
            <p style="font-size: 0.85em; color: #8B7E6D; line-height: 1.6;">不只是教練，更是您長跑路上的溫暖夥伴。</p>
        </div>

        <!-- 六角形 2 (中心重點) -->
        <div style="width: 250px; height: 280px; background: #7A6348; clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%); display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; color: white;">
            <div style="font-size: 1.2em; font-weight: bold; letter-spacing: 2px;">古佳倫</div>
            <div style="font-size: 0.8em; opacity: 0.8;">RUNNING COACH</div>
            <hr style="width: 40px; border: 0; border-top: 1px solid rgba(255,255,255,0.3); margin: 15px 0;">
            <div style="font-size: 0.9em;">用善良</div>
            <div style="font-size: 0.9em;">成就您的每一步</div>
        </div>

        <!-- 六角形 3 -->
        <div style="width: 250px; height: 280px; background: #FAF4E6; clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%); display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px;">
            <div style="font-size: 1.5em; color: #8B7355; margin-bottom: 10px;">⚖</div>
            <div style="font-weight: bold; color: #8B7355; margin-bottom: 8px;">科學數據</div>
            <p style="font-size: 0.85em; color: #8B7E6D; line-height: 1.6;">精準調控訓練負荷，讓進步更有效率。</p>
        </div>

    </div>
</section>

</body>
</html>
