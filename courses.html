<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>課程簡介 - 跑班訓練營</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
  <script src="nav_bar.js"></script>
  <div id="navBar"></div>

<section style="max-width: 950px; margin: 40px auto; font-family: 'PingFang TC', sans-serif; text-align: center;">
    
    <div style="margin-bottom: 30px;">
        <h2 style="color: #7A6348; letter-spacing: 2px; font-weight: 900;">古佳倫｜煦光跑訓 核心價值</h2>
    </div>

    <!-- 蜂巢式核心價值佈局 -->
    <div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; padding: 20px;">
        
        <!-- 線上課表核心 -->
        <div style="width: 250px; height: 280px; background: #FFF9E6; clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%); display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; border: 1px solid #F3E5AB;">
            <div style="font-weight: bold; color: #7A6348; margin-bottom: 10px;">數據驅動訓練</div>
            <p style="font-size: 0.85em; color: #8B7E6D; line-height: 1.6;">打破地理限制<br>科學調控每一公里的<br>訓練價值</p>
        </div>

        <!-- 溫暖品牌核心 -->
        <div style="width: 250px; height: 280px; background: #7A6348; clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%); display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; color: white;">
            <div style="font-size: 1.2em; font-weight: bold;">古佳倫</div>
            <div style="font-size: 0.7em; opacity: 0.8; margin-bottom: 15px;">RUNNING COACH</div>
            <p style="font-size: 0.9em; line-height: 1.6;">讓每一滴汗水<br>都值得被溫柔聽見</p>
        </div>

        <!-- 私人教學核心 -->
        <div style="width: 250px; height: 280px; background: #FAF4E6; clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%); display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px;">
            <div style="font-weight: bold; color: #8B7355; margin-bottom: 10px;">動力鏈優化</div>
            <p style="font-size: 0.85em; color: #8B7E6D; line-height: 1.6;">根據身體結構優化<br>靠精準的科學數據<br>實現進步</p>
        </div>

    </div>
</section>

</body>
</html>
