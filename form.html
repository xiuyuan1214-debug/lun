<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, "PingFang TC", "Microsoft JhengHei", sans-serif;
            background-color: #ffffff;
            color: #333;
            line-height: 1.6;
        }

        /* 上方黃色區塊 */
        .header-section {
            background-color: #fcf6e3;
            padding: 40px 25px;
            margin: 15px;
            border-radius: 10px 10px 40px 10px;
        }
        .main-title { font-size: 24px; color: #8b7355; font-weight: 700; margin-bottom: 5px; }
        .sub-title { font-size: 12px; color: #b5a48b; font-weight: 700; letter-spacing: 1px; margin-bottom: 25px; display: block; }
        .greeting { font-size: 15px; color: #8b7355; font-weight: 700; margin-bottom: 20px; }
        .content-text { font-size: 15px; color: #7a6e5d; margin-bottom: 20px; text-align: justify; }
        .footer-note { 
            font-size: 12px; 
            color: #b5a48b; 
            border-top: 1px solid #eee; 
            padding-top: 15px; 
            margin-top: 20px;
        }

        /* 下方表單區塊 */
        .form-section { padding: 40px 25px; }
        .form-group { margin-bottom: 25px; }
        .label { 
            font-size: 18px; 
            color: #8b7355; 
            font-weight: 700; 
            margin-bottom: 12px; 
            display: block; 
        }
        input, select, textarea {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #eee;
            border-radius: 8px;
            background-color: #fafafa;
            font-size: 14px;
            color: #666;
            outline: none;
        }
        .row { display: flex; gap: 15px; }
        .row .form-group { flex: 1; }
        textarea { height: 120px; resize: none; }

        ::placeholder { color: #ccc; }
    </style>
</head>
<body>

    <!-- 上方內容 -->
    <div class="header-section">
        <h1 class="main-title">跑者服務中心</h1>
        <span class="sub-title">RUNNER SERVICE CENTER</span>
        
        <p class="greeting">讓我們聽見您的腳步聲</p>
        
        <p class="content-text">無論您是因為突破個人最佳成績而興奮，亦或是正處於受傷低潮，有任何想回饋的想法，歡迎隨時聯繫我們唷 ᴗ̈</p>
        
        <p class="content-text">您的回饋是我們進化的動力，您的提問是我們探索的方向，若您在訓練的路上遇到瓶頸，或者發現我們能做得更好的地方，請告訴我們。</p>
        
        <p class="content-text">讓我們一起朝更好的自己邁進，讓這份對跑步的熱愛，連結起每一個熱血的靈魂。希望這裡不只是網站，更是跑者們的補給站。</p>
        
        <div class="footer-note">
            𖤐 服務時間：週一至週五 09:00 - 18:00 (跑者不休息，但小編需要一些運動時間)
        </div>
    </div>

    <!-- 下方表單 -->
    <div class="form-section">
        <div class="form-group">
            <label class="label">姓名 / Name</label>
            <input type="text" placeholder="請輸入您的姓名">
        </div>

        <div class="form-group">
            <label class="label">電子信箱 / E-mail</label>
            <input type="email" placeholder="runner@example.com">
        </div>

        <div class="form-group">
            <label class="label">跑者屬性</label>
            <select>
                <option>新手跑者</option>
            </select>
        </div>

        <div class="row">
            <div class="form-group">
                <label class="label">跑步最佳成績 (PB)</label>
                <input type="text" placeholder="例如：全馬3:30:00">
            </div>
            <div class="form-group">
                <label class="label">目標成績</label>
                <input type="text" placeholder="例如：全馬2:59:59">
            </div>
        </div>

        <div class="form-group">
            <label class="label">慣用穿戴配備</label>
            <input type="text" placeholder="例如：Garmin, Apple Watch, Coros">
        </div>

        <div class="form-group">
            <label class="label">您的問題</label>
            <textarea placeholder="每一滴汗水，都值得被聽見..."></textarea>
        </div>
    </div>

</body>
</html>

</body>
</html>

</body>
</html>
