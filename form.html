<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>課程簡介 - 跑班訓練營</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
 
<script src="nav_bar.js"></script>
<div id="navBar"></div>

<section style="max-width: 800px; margin: 40px auto; font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; color: #5F554A; background: white; line-height: 1.8;">

    <!-- 標題與感性文案區塊 (陽光柔黃) -->
    <div style="margin-bottom: 30px; background: #FFFBF0; border-radius: 20px; padding: 40px; border-left: 8px solid #F3E5AB;">
        <div style="font-size: 2em; font-weight: 900; color: #84764B; margin-bottom: 5px;">跑者服務中心</div>
        <div style="font-size: 0.75em; color: #B5A88B; font-weight: bold; letter-spacing: 2px; margin-bottom: 30px;">RUNNER SERVICE CENTER</div>
        
        <p style="font-weight: bold; color: #8B7355; margin-bottom: 18px; font-size: 1.15em;">讓我們聽見您の腳步聲</p>
        
        <div style="font-size: 0.98em; color: #6B6359;">
            <p style="margin-bottom: 15px;">無論您是因為突破個人最佳成績而興奮，亦或是正處於受傷低潮，有任何想回饋的想法，歡迎隨時聯繫我們唷 ᴗ̈</p>
            <p style="margin-bottom: 15px;">您的回饋是我們進化的動力，您的提問是我們探索的方向，若您在訓練的路上遇到瓶頸，或者發現我們能做得更好的地方，請告訴我們。</p>
            <p>讓我們一起朝更好的自己邁進，讓這份對跑步的熱愛，連結起每一個熱血的靈魂。希望這裡不只是網站，更是跑者們的補給站。</p>
        </div>

        <div style="margin-top: 25px; font-size: 0.88em; color: #8B7E6D; border-top: 1px solid #F0E6D2; padding-top: 18px; display: flex; align-items: center;">
            <span style="margin-right: 6px; font-size: 1.1em;">𖤐</span>服務時間：週一至週五 09:00 - 18:00 (跑者不休息，但小編需要一些運動時間)
        </div>
    </div>

    <!-- 表單區塊 -->
    <form action="" method="post" style="background: #FFFFFF; border-radius: 20px; padding: 40px; border: 1px solid #F5EEDA; box-shadow: 0 10px 30px rgba(181, 164, 139, 0.1);">
        
        <div style="margin-bottom: 25px;">
            <label style="display: block; font-weight: bold; margin-bottom: 10px; color: #84764B;">姓名 / Name</label>
            <input type="text" name="txtName" placeholder="請輸入您的姓名" style="width: 100%; padding: 14px; border-radius: 10px; border: 1px solid #E6DBC3; outline: none; background: #FFFEFB;">
        </div>

        <div style="margin-bottom: 25px;">
            <label style="display: block; font-weight: bold; margin-bottom: 10px; color: #84764B;">電子信箱 / E-mail</label>
            <input type="email" name="txtMail" placeholder="runner@example.com" style="width: 100%; padding: 14px; border-radius: 10px; border: 1px solid #E6DBC3; outline: none;">
        </div>

        <div style="margin-bottom: 25px;">
            <label style="display: block; font-weight: bold; margin-bottom: 10px; color: #84764B;">跑者屬性</label>
            <select name="runnerType" style="width: 100%; padding: 14px; border-radius: 10px; border: 1px solid #E6DBC3; background: #FFFEFB; outline: none; color: #666;">
                <option value="新手跑者">新手跑者</option>
                <option value="半馬跑者">半馬跑者</option>
                <option value="全馬跑者">全馬跑者</option>
                <option value="超馬/越野跑者">超馬 / 越野跑者</option>
            </select>
        </div>

        <div style="margin-bottom: 25px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div>
                <label style="display: block; font-weight: bold; margin-bottom: 10px; color: #84764B;">跑步最佳成績 (PB)</label>
                <input type="text" name="txtPB" placeholder="例如：全馬3:30:00" style="width: 100%; padding: 14px; border-radius: 10px; border: 1px solid #E6DBC3; outline: none; background: #FFFEFB;">
            </div>
            <div>
                <label style="display: block; font-weight: bold; margin-bottom: 10px; color: #84764B;">目標成績</label>
                <input type="text" name="txtTarget" placeholder="例如：全馬2:59:59" style="width: 100%; padding: 14px; border-radius: 10px; border: 1px solid #E6DBC3; outline: none; background: #FFFEFB;">
            </div>
        </div>

        <div style="margin-bottom: 25px;">
            <label style="display: block; font-weight: bold; margin-bottom: 10px; color: #84764B;">慣用穿戴配備</label>
            <input type="text" name="txtGear" placeholder="例如：Garmin, Apple Watch, Coros" style="width: 100%; padding: 14px; border-radius: 10px; border: 1px solid #E6DBC3; outline: none;">
        </div>

        <div style="margin-bottom: 30px;">
            <label style="display: block; font-weight: bold; margin-bottom: 10px; color: #84764B;">您的問題</label>
            <textarea name="textArea" rows="5" placeholder="每一滴汗水，都值得被聽見…" style="width: 100%; padding: 14px; border-radius: 10px; border: 1px solid #E6DBC3; outline: none; resize: vertical; background: #FFFEFB;"></textarea>
        </div>

        <!-- 驗證碼 (淡黃調) -->
        <div style="background: #FFFDF5; padding: 22px; border-radius: 12px; border-left: 6px solid #F3E5AB; margin-bottom: 35px;">
            <label style="display: block; font-weight: bold; margin-bottom: 10px; color: #8B7E6D;">驗證碼</label>
            <div style="display: flex; gap: 15px; align-items: center;">
                <div style="background: #FFF; padding: 10px 25px; border: 1px dashed #F3E5AB; font-family: 'Courier New', monospace; letter-spacing: 6px; font-weight: bold; color: #84764B; user-select: none;">
                    RUNNER
                </div>
                <input type="text" name="captcha" placeholder="輸入代碼" style="flex-grow: 1; padding: 12px; border-radius: 8px; border: 1px solid #EBE4D5; outline: none;">
            </div>
        </div>

        <!-- 按鈕區 (沈穩黃褐色) -->
        <div style="text-align: center; display: flex; gap: 20px; justify-content: center;">
            <input type="reset" value="重新填寫" style="cursor: pointer; background: #F7F2E8; color: #8B7E6D; border: none; padding: 14px 45px; border-radius: 12px; font-weight: bold;">
            <input type="submit" value="送出訊息" style="cursor: pointer; background: #84764B; color: #FFF; border: none; padding: 14px 70px; border-radius: 12px; font-weight: bold; box-shadow: 0 6px 15px rgba(132, 118, 75, 0.25);">
        </div>
    </form>

</section>

</body>
</html>
