<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            padding: 20px;
            font-family: "Microsoft JhengHei", sans-serif;
            margin: 0;
        }

        .container {
            background-color: #ffe89b;
            width: 100%;
            max-width: 500px;
            border-radius: 120px 120px 40px 40px;
            padding: 50px 30px 40px 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            text-align: center;
            color: #5d4037;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 5px;
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: 14px;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 30px;
            font-weight: bold;
        }

        .highlight-box {
            background-color: rgba(255, 255, 255, 0.5);
            display: inline-block;
            padding: 8px 25px;
            border-radius: 50px;
            font-size: 20px;
            font-weight: bold;
            color: #d4a017;
            margin-bottom: 35px;
        }

        .content {
            text-align: left;
            line-height: 1.8;
            font-size: 15px;
            margin-bottom: 40px;
            font-weight: 500;
        }

        .content p {
            margin-bottom: 20px;
        }

        .footer-note {
            font-size: 12px;
            color: rgba(93, 64, 55, 0.6);
            border-top: 1px solid rgba(93, 64, 55, 0.1);
            padding-top: 20px;
            text-align: left;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>跑者服務中心</h1>
    <div class="subtitle">RUNNER SERVICE CENTER</div>

    <div class="highlight-box">
        讓我們聽見您的腳步聲
    </div>

    <div class="content">
        <p>無論您是因為突破個人最佳成績而興奮，亦或是正處於受傷低潮，有任何想回饋的想法，歡迎隨時聯繫我們唷 ☺️</p>
        <p>您的回饋是我們進化的動力，您的提問是我們探索的方向，若您在訓練的路上遇到瓶頸，或者發現我們能做得更好的地方，請告訴我們。</p>
        <p>讓我們一起朝更好的自己邁進，讓這份對跑步熱愛，連結起每一個熱血的靈魂。希望這裡不只是網站，更是跑者們的補給站。</p>
    </div>

    <div class="footer-note">
        ＊ 服務時間：週一至週五 09:00 - 18:00 (跑者不休息，但小編需要一些運動時間)
    </div>
</div>

</body>
</html>
