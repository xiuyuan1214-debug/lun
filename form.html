<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>跑者服務中心 | 聯絡我們</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 確保選單的基本外觀 */
        .nav-bar {
            background-color: #333;
            padding: 12px 20px;
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .nav-item {
            color: #ffffff;
            text-decoration: none;
            font-size: 16px;
            font-weight: bold;
        }
        .header-section {
            background-color: #ff9e6; /* 溫暖的淺黃背景 */
            padding: 30px 20px;
            text-align: center;
        }
        .content-limit {
            max-width: 600px;
            margin: 20px auto;
            padding: 20px;
        }
    </style>
</head>
<body>

    <!-- 1. 導覽列位置 (由 nav_bar.js 注入內容) -->
    <div id="navBar"></div>

    <div class="header-section">
        <h1>聯絡我們</h1>
        <p>希望這裡不只是網站，更是跑者們的補給站</p>
    </div>

    <div class="content-limit">
        <!-- 這裡放您原本的表單內容 -->
        <p>諮詢預約表單正在準備中...</p>
    </div>

    <!-- 2. 載入導覽列指令 -->
    <script src="nav_bar.js"></script>

</body>
</html>
