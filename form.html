<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>課程簡介 - 跑班訓練營</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
 
<script src="nav_bar.js"></script>
<div id="navBar"></div>

<section style="max-width: 800px; margin: 40px auto; font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; color: #444; background: white; line-height: 1.6;">

    <!-- 標題區塊 (淡藍) -->
    <div style="margin-bottom: 30px; background: #F0F7FF; border-radius: 15px; padding: 35px 40px;">
        <div style="font-size: 1.9em; font-weight: 900; color: #2C3E50; margin-bottom: 5px;">跑者服務中心</div>
        <div style="font-size: 0.7em; color: #3498DB; font-weight: bold; letter-spacing: 2px; margin-bottom: 25px;">RUNNER SERVICE CENTER</div>
        
        <p style="font-weight: bold; color: #3498DB; margin-bottom: 15px;">讓我們聽見您的腳步聲</p>
        <p style="font-size: 0.95em; color: #666; margin-bottom: 15px;">
            無論您是因為突破個人最佳成績而興奮，亦或是正處於受傷低潮，有任何想回饋的想法，歡迎隨時聯繫我們唷 ᴗ̈
        </p>
        <p style="font-size: 0.95em; color: #666;">
            讓我們一起朝更好的自己邁進，讓這份對跑步的熱愛，連結起每一個熱血的靈魂。希望這裡不只是網站，更是跑者們的補給站。
        </p>
        <div style="margin-top: 20px; font-size: 0.85em; color: #888; border-top: 1px solid rgba(52, 152, 219, 0.2); padding-top: 15px;">
            𖤐 服務時間：週一至週五 09:00 - 18:00 (跑者不休息，但小編需要一些運動時間)
        </div>
    </div>

    <!-- 表單區塊 (淡藍背景，深藍文字) -->
    <form action="" method="post" style="background: #F8FBFF; border-radius: 15px; padding: 40px; border: none;">
        
        <div style="margin-bottom: 25px;">
            <label style="display: block; font-weight: bold; margin-bottom: 8px; color: #2C3E50;">
                姓名 / Name
            </label>
            <input type="text" name="txtName" placeholder="請輸入姓名" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #D0E1F0; outline: none;">
        </div>

        <div style="margin-bottom: 25px;">
            <label style="display: block; font-weight: bold; margin-bottom: 8px; color: #2C3E50;">
                電子信箱 / E-mail
            </label>
            <input type="email" name="txtMail" placeholder="example@email.com" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #D0E1F0; outline: none;">
        </div>

        <div style="margin-bottom: 25px;">
            <label style="display: block; font-weight: bold; margin-bottom: 8px; color: #2C3E50;">
                跑者屬性
            </label>
            <select name="runnerType" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #D0E1F0; background: white; outline: none;">
                <option value="新手跑者">新手跑者</option>
                <option value="半馬跑者">半馬跑者</option>
                <option value="全馬跑者">全馬跑者</option>
                <option value="超馬/越野跑者">超馬 / 越野跑者</option>
            </select>
        </div>

        <div style="margin-bottom: 25px;">
            <label style="display: block; font-weight: bold; margin-bottom: 8px; color: #2C3E50;">
                跑步最佳成績 (PB)
            </label>
            <input type="text" name="txtPB" placeholder="例如：全馬 03:50:00" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #D0E1F0; outline: none;">
        </div>

        <div style="margin-bottom: 25px;">
            <label style="display: block; font-weight: bold; margin-bottom: 8px; color: #2C3E50;">
                慣用穿戴配備
            </label>
            <input type="text" name="txtGear" placeholder="例如：Garmin, Coros" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #D0E1F0; outline: none;">
        </div>

        <div style="margin-bottom: 25px;">
            <label style="display: block; font-weight: bold; margin-bottom: 8px; color: #2C3E50;">
                您的問題
            </label>
            <textarea name="textArea" rows="6" placeholder="想對我們說什麼？" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #D0E1F0; outline: none; resize: vertical;"></textarea>
        </div>

        <!-- 驗證碼區塊 (淡綠) -->
        <div style="background: #F2FAF5; padding: 20px; border-radius: 12px; border-left: 5px solid #27AE60; margin-bottom: 30px;">
            <label style="display: block; font-weight: bold; margin-bottom: 8px; color: #27AE60;">
                驗證碼
            </label>
            <div style="display: flex; gap: 15px; align-items: center;">
                <div style="background: #FFF; padding: 8px 20px; border: 1px dashed #27AE60; font-family: monospace; letter-spacing: 5px; font-weight: bold; color: #27AE60; user-select: none;">
                    4R8NN3R
                </div>
                <input type="text" name="captcha" placeholder="輸入上方代碼" style="flex-grow: 1; padding: 10px; border-radius: 8px; border: 1px solid #D5E8D9; outline: none;">
            </div>
            <p style="font-size: 0.75em; color: #888; margin-top: 10px;">(防止機器人垃圾郵件)</p>
        </div>

        <!-- 按鈕 -->
        <div style="text-align: center; display: flex; gap: 15px; justify-content: center;">
            <input type="reset" value="重設資訊" style="cursor: pointer; background: #EEE; color: #666; border: none; padding: 12px 40px; border-radius: 8px; font-weight: bold;">
            <input type="submit" value="送出訊息" style="cursor: pointer; background: #2C3E50; color: #FFF; border: none; padding: 12px 60px; border-radius: 8px; font-weight: 900; box-shadow: 0 5px 15px rgba(0,0,0,0.1);">
        </div>
    </form>

</section>

</body>
</html>
