<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>課程簡介 - 跑班訓練營</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
 
<script src="nav_bar.js"></script>
<div id="navBar"></div>

<section style="max-width: 800px; margin: 40px auto; font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; color: #555; background: white; line-height: 1.8;">

    <!-- 標題區塊 (淡粉紫) -->
    <div style="margin-bottom: 30px; background: #F9F7FA; border-radius: 15px; padding: 35px 40px;">
        <div style="font-size: 1.9em; font-weight: 900; color: #6D5B7B; margin-bottom: 5px;">跑者服務中心</div>
        <div style="font-size: 0.7em; color: #B5A1B7; font-weight: bold; letter-spacing: 2px; margin-bottom: 25px;">RUNNER SERVICE CENTER</div>
        
        <p style="font-weight: bold; color: #A085A4; margin-bottom: 15px; font-size: 1.1em;">讓我們聽見您の腳步聲</p>
        
        <div style="font-size: 0.95em; color: #777;">
            <p style="margin-bottom: 15px;">無論您是因為突破個人最佳成績而興奮，亦或是正處於受傷低潮，有任何想回饋的想法，歡迎隨時聯繫我們唷 ᴗ̈</p>
            <p style="margin-bottom: 15px;">您的回饋是我們進化的動力，您的提問是我們探索的方向。若您在訓練的路上遇到瓶頸，或者發現我們能做得更好的地方，請告訴我們。</p>
            <p>讓我們一起朝更好的自己邁進，讓這份對跑步的熱愛，連結起每一個熱血的靈魂。希望這裡不只是網站，更是跑者們的補給站。</p>
        </div>

        <div style="margin-top: 25px; font-size: 0.85em; color: #8E7C93; border-top: 1px solid #E6DEE9; padding-top: 15px; display: flex; align-items: center;">
            <span style="margin-right: 4px; font-size: 1.1em;">𖤐</span>服務時間：週一至週五 09:00 - 18:00 (跑者不休息，但小編需要一些運動時間)
        </div>
    </div>

    <!-- 表單區塊 (柔和紫色調) -->
    <form action="" method="post" style="background: #FCF9FE; border-radius: 15px; padding: 40px; border: 1px solid #F0E6F2;">
        
        <div style="margin-bottom: 25px;">
            <label style="display: block; font-weight: bold; margin-bottom: 8px; color: #6D5B7B;">姓名 / Name</label>
            <input type="text" name="txtName" placeholder="請輸入姓名" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #E3D7E5; outline: none; background: white;">
        </div>

        <div style="margin-bottom: 25px;">
            <label style="display: block; font-weight: bold; margin-bottom: 8px; color: #6D5B7B;">電子信箱 / E-mail</label>
            <input type="email" name="txtMail" placeholder="example@email.com" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #E3D7E5; outline: none; background: white;">
        </div>

        <div style="margin-bottom: 25px;">
            <label style="display: block; font-weight: bold; margin-bottom: 8px; color: #6D5B7B;">跑者屬性</label>
            <select name="runnerType" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #E3D7E5; background: white; outline: none; color: #666;">
                <option value="新手跑者">新手跑者</option>
                <option value="半馬跑者">半馬跑者</option>
                <option value="全馬跑者">全馬跑者</option>
                <option value="超馬/越野跑者">超馬 / 越野跑者</option>
            </select>
        </div>

        <div style="margin-bottom: 25px;">
            <label style="display: block; font-weight: bold; margin-bottom: 8px; color: #6D5B7B;">跑步最佳成績 (PB)</label>
            <input type="text" name="txtPB" placeholder="例如：全馬 03:50:00" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #E3D7E5; outline: none; background: white;">
        </div>

        <div style="margin-bottom: 25px;">
            <label style="display: block; font-weight: bold; margin-bottom: 8px; color: #6D5B7B;">慣用穿戴配備</label>
            <input type="text" name="txtGear" placeholder="例如：Garmin, Coros" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #E3D7E5; outline: none; background: white;">
        </div>

        <div style="margin-bottom: 25px;">
            <label style="display: block; font-weight: bold; margin-bottom: 8px; color: #6D5B7B;">您的問題</label>
            <textarea name="textArea" rows="6" placeholder="想對我們說什麼？" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #E3D7E5; outline: none; resize: vertical; background: white;"></textarea>
        </div>

        <!-- 驗證碼區塊 (低飽和綠) -->
        <div style="background: #F4F7F5; padding: 20px; border-radius: 12px; border-left: 5px solid #A8C3B0; margin-bottom: 30px;">
            <label style="display: block; font-weight: bold; margin-bottom: 8px; color: #7A9081;">驗證碼</label>
            <div style="display: flex; gap: 15px; align-items: center;">
                <div style="background: #FFF; padding: 8px 20px; border: 1px dashed #A8C3B0; font-family: monospace; letter-spacing: 5px; font-weight: bold; color: #7A9081; user-select: none;">
                    4R8NN3R
                </div>
                <input type="text" name="captcha" placeholder="輸入上方代碼" style="flex-grow: 1; padding: 10px; border-radius: 8px; border: 1px solid #DCE3DE; outline: none;">
            </div>
            <p style="font-size: 0.75em; color: #999; margin-top: 10px;">(防止機器人垃圾郵件)</p>
        </div>

        <!-- 按鈕 -->
        <div style="text-align: center; display: flex; gap: 15px; justify-content: center;">
            <input type="reset" value="重設資訊" style="cursor: pointer; background: #F0EBF2; color: #8E7C93; border: none; padding: 12px 40px; border-radius: 8px; font-weight: bold;">
            <input type="submit" value="送出訊息" style="cursor: pointer; background: #6D5B7B; color: #FFF; border: none; padding: 12px 60px; border-radius: 8px; font-weight: bold; box-shadow: 0 4px 10px rgba(109, 91, 123, 0.2);">
        </div>
    </form>

</section>

</body>
</html>
